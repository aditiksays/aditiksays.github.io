<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibrant Life | Digital Journal</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,400&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* --- PLAYFUL & BRIGHT PALETTE --- */
            --soft-sky: #637b7a;      /* Fresh minty base */
            --taffy-pink: #951b44;    /* Playful accent */
            --electric-lavender: #14024588; /* Energetic date color */
            --marshmallow: #c79090;   /* Pure white cards */
            --ink-blue: #263238;      /* Deep blue-grey text (easier on eyes) */
            
            --header-font: 'Cormorant Garamond', serif;
            --body-font: 'Lato', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            /* --- BACKGROUND IMAGE PLACEHOLDER --- */ 
                        url('blue lily.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            
            color: var(--ink-blue);
            font-family: var(--body-font);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* --- Header & Navigation --- */
        header {
            position: sticky;
            top: 0;
            width: 100%;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 50px;
            z-index: 1000;
            background: rgba(232, 140, 140, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--taffy-pink);
        }

        .search-container {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .search-bar {
            background: var(--marshmallow);
            border: 2px solid var(--soft-sky);
            padding: 10px 25px;
            border-radius: 50px;
            width: 260px;
            outline: none;
            text-align: center;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .search-bar:focus { 
            width: 340px; 
            border-color: var(--taffy-pink);
            box-shadow: 0 0 15px rgba(255, 128, 170, 0.45);
        }

        .menu-btn { 
            cursor: pointer; 
            font-family: var(--body-font); 
            font-weight: 700;
            font-size: 0.9rem; 
            color: var(--electric-lavender); 
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* --- Side Drawer --- */
        .nav-drawer {
            position: fixed;
            top: 0;
            right: -320px;
            width: 320px;
            height: 100%;
            background: var(--marshmallow);
            z-index: 2000;
            transition: right 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 80px 40px;
            box-shadow: -10px 0 30px rgba(0,0,0,0.1);
        }

        .nav-drawer.open { right: 0; }

        .nav-drawer a {
            display: block;
            font-family: var(--header-font);
            font-size: 2.2rem;
            color: var(--ink-blue);
            text-decoration: none;
            margin-bottom: 25px;
            transition: color 0.3s;
        }

        .nav-drawer a:hover { color: var(--taffy-pink); }

        /* --- Journal Content --- */
        .container {
            max-width: 750px;
            margin: 0 auto;
            padding: 60px 20px;
            position: relative;
            z-index: 20; 
        }

        .post-card {
            background: var(--marshmallow);
            padding: 60px;
            margin-bottom: 80px;
            box-shadow: 0 20px 40px rgba(187, 86, 40, 0.393);
            border-radius: 20px; /* More playful rounded corners */
            border-bottom: 8px solid var(--soft-sky);
            transition: transform 0.3s ease;
        }

        .post-card:hover { transform: translateY(-5px); }

        h2 { font-family: var(--header-font); font-size: 3rem; margin-bottom: 15px; color: var(--ink-blue); }

        .post-date { 
            color: var(--electric-lavender); 
            font-size: 0.9rem; 
            font-weight: 900; 
            margin-bottom: 10px; 
            display: block; 
            letter-spacing: 1px;
        }

        .image-break {
            width: 100vw;
            height: 450px;
            background: var(--taffy-pink);
            margin: 80px 0;
            position: relative;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: var(--header-font);
            font-size: 2rem;
            font-weight: bold;
        }

        /* --- STICKERS --- */
        #sticker-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10; 
        }

        .sticker {
            position: absolute;
            width: 160px;
            height: 160px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .sticker img {
            max-width: 100%; max-height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
        }

        .sticker-label {
            font-size: 10px;
            text-transform: uppercase;
            font-weight: 800;
            color: white;
            background: var(--electric-lavender);
            padding: 4px 10px;
            margin-top: 10px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        @media (max-width: 768px) {
            .post-card { padding: 35px 25px; }
            .sticker { display: none; }
            h2 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <div id="sticker-canvas"></div>

    <header>
        <div style="font-family: var(--header-font); font-size: 1.6rem; font-weight: 800; color: var(--taffy-pink);">DAILY GLOW.</div>
        <div class="search-container">
            <input type="text" class="search-bar" placeholder="Search a happy thought...">
        </div>
        <div class="menu-btn" onclick="toggleMenu()">EXPLORE +</div>
    </header>

    <nav class="nav-drawer" id="navDrawer">
        <div class="menu-btn" style="text-align: right; margin-bottom: 40px;" onclick="toggleMenu()">CLOSE X</div>
        <a href="#" onclick="toggleMenu()">The Archive</a>
        <a href="#" onclick="toggleMenu()">Photo Booth</a>
        <a href="#" onclick="toggleMenu()">Color Palettes</a>
        <a href="#" onclick="toggleMenu()">About Me</a>
    </nav>

    <div class="container">
        <main id="journal-feed"></main>
    </div>

    <script>
        // --- STICKER URLs ---
        const stickerUrls = [
            "URL_FOR_PLAYFUL_STICKER_1",
            "URL_FOR_PLAYFUL_STICKER_2",
            "URL_FOR_PLAYFUL_STICKER_3",
            "URL_FOR_PLAYFUL_STICKER_4",
            "URL_FOR_PLAYFUL_STICKER_5",
            "URL_FOR_PLAYFUL_STICKER_6",
            "URL_FOR_PLAYFUL_STICKER_7",
            "URL_FOR_PLAYFUL_STICKER_8",
            "URL_FOR_PLAYFUL_STICKER_9",
            "URL_FOR_PLAYFUL_STICKER_10"
        ];

        // --- BLOG CONTENT ---
        const journalData = [
            { title: "Sunshine & Sprinkles", date: "APRIL 17, 2026", content: "Today was incredible. I finally sat down at my desk with a giant iced coffee and realized how much better everything feels when you embrace the color!", comments: ["Love this energy!"] },
            { title: "Pop of Pink", date: "APRIL 14, 2026", content: "I bought a fresh bouquet of peonies today. They matched my journal perfectly. It's the little things that make the big difference.", comments: ["Peonies are the best."] },
            { title: "Creative Spark", date: "APRIL 10, 2026", content: "Doodling in the margins for three hours instead of working. No regrets. Creativity isn't a straight line anyway.", comments: [] },
            { title: "Visual Break!", date: "APRIL 05, 2026", content: "Look at the colorful break below! Sometimes you just need to stop writing and just look at something beautiful.", comments: [] },
            { title: "Adventure Awaits", date: "MARCH 30, 2026", content: "Packing for the weekend trip. I'm bringing three different cameras and four journals. I might have a problem, but it's a fun one.", comments: ["Have fun!"] }
        ];

        function renderJournal() {
            const feed = document.getElementById('journal-feed');
            let html = '';
            journalData.forEach((post, index) => {
                html += `
                    <article class="post-card">
                        <span class="post-date">${post.date}</span>
                        <h2>${post.title}</h2>
                        <p>${post.content}</p>
                        <div style="margin-top:25px; border-top:2px solid var(--soft-sky); padding-top:15px;">
                            <small style="color:var(--taffy-pink); font-weight:bold;">Add a smiley...</small>
                        </div>
                    </article>
                `;
                if (index === 2) html += `<div class="image-break">FULL WIDTH COLOR POP!</div>`;
            });
            feed.innerHTML = html;
        }

        function spawnStickers() {
            const canvas = document.getElementById('sticker-canvas');
            const pageHeight = document.body.scrollHeight;
            
            stickerUrls.forEach((url, i) => {
                const sticker = document.createElement('div');
                sticker.className = 'sticker';
                
                const topPos = (pageHeight / 11) * (i + 1) + (Math.random() * 120);
                const isLeft = Math.random() > 0.5;
                const leftPos = isLeft ? (Math.random() * 10) : (85 + Math.random() * 5);
                
                sticker.style.top = `${topPos}px`;
                sticker.style.left = `${leftPos}%`;
                sticker.style.transform = `rotate(${Math.random() * 40 - 20}deg)`;
                
                sticker.innerHTML = `
                    <img src="${url}" alt="Happy Sticker ${i+1}" onerror="this.style.display='none'">
                    <span class="sticker-label">STICKER_${i+1}</span>
                `;
                
                canvas.appendChild(sticker);
            });
        }

        function toggleMenu() { document.getElementById('navDrawer').classList.toggle('open'); }

        window.onload = () => {
            renderJournal();
            setTimeout(spawnStickers, 300);
        };
    </script>
</body>
</html>
