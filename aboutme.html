<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Digital Journal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,500&family=Quicksand:wght@300;500&family=Sacramento&display=swap');

        :root {
            --bg-cream: #fdfbfb;
            --soft-blue: #e3f2fd;
            --dusty-pink: #fce4ec;
            --text: #4a5a6a;
        }

        body {
            margin: 0;
            background: var(--soft-blue); /* Light Blue base */
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .page-container {
            width: 100%;
            max-width: 450px;
            background: var(--bg-cream); /* Cream page */
            padding: 30px;
            border-radius: 15px;
            box-shadow: 10px 10px 40px rgba(0,0,0,0.05);
            border: 1px solid var(--dusty-pink); /* Subtle Pink border */
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: var(--text);
            margin: 0;
        }

        .profile-pic {
            border: 8px solid white;
            outline: 1px solid var(--dusty-pink);
            width: 180px;
            height: 230px;
            margin: 20px 0;
            background: #eee;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .profile-pic img { width: 100%; height: 100%; object-fit: cover; }

        blockquote {
            font-family: 'Sacramento', cursive;
            font-size: 1.6rem;
            color: #d81b60; /* Soft Pinkish-Red for the quote */
            margin: 10px 0;
        }

        /* License Card */
        .license {
            background: #fff9e6; /* Creamier card */
            border: 1.5px dashed #c4a484;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            width: 100%;
            box-sizing: border-box;
            transform: rotate(1deg);
        }

        .license-header {
            font-size: 0.6rem;
            letter-spacing: 1px;
            margin-bottom: 10px;
            color: #8b7d6b;
        }

        .license-body { display: flex; gap: 15px; align-items: center; }

        .id-box {
            width: 70px;
            height: 70px;
            border: 1px solid #ddd;
            background: white;
        }

        .details {
            text-align: left;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text);
        }

        .sign {
            font-family: 'Sacramento', cursive;
            font-size: 1.2rem;
            text-transform: none;
            margin-top: 5px;
        }

        .back {
            text-decoration: none;
            font-size: 0.7rem;
            color: var(--text);
            opacity: 0.6;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="page-container">
    <a href="index.html" class="back">BACK TO COVER</a>
    
    <h1>Student Profile</h1>
    
    <div class="profile-pic">
        <img src="your-photo.jpg" alt="Profile">
    </div>

    <blockquote>"I'm not killing people, I'm killing boys."</blockquote>
    
    <div class="license">
        <div class="license-header">PERMANENT LICENSE OF TRAVEL</div>
        <div class="license-body">
            <div class="id-box">
                <img src="id-photo.jpg" alt="ID" style="width:100%; height:100%; object-fit:cover;">
            </div>
            <div class="details">
                <div>Name: Aditi K</div>
                <div>Issue: 2026</div>
                <div class="sign">Aditi</div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
