<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>About Me - Stamped Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,500;1,700&family=Quicksand:wght@300;500&family=Sacramento&display=swap');

        :root {
            --bg-pink-cream: #f4dcd6;   
            --soft-blue-tint: #c5d9ed;  
            --butter-yellow: #f9e1a0;   
            --text-dark: #1a2a38;       
            --star-gold: #ffcc33;       
            --accent-pink: #eeb8b8;     
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            background-color: var(--bg-pink-cream);
            font-family: 'Quicksand', sans-serif;
            overflow-y: auto; 
            overflow-x: hidden;
            display: flex;
            justify-content: center;
        }

        .page-container {
            width: 95vw;
            max-width: 600px; /* Narrower for vertical stacking */
            margin: 40px auto;
            display: flex;
            flex-direction: column; /* Stacking elements vertically */
            align-items: center;
            position: relative;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 3rem;
            color: var(--text-dark);
            margin-bottom: 20px;
            align-self: flex-start;
        }

        /* 1. YEARBOOK (PORTRAIT) */
        .yearbook-frame {
            width: 100%;
            border: 3px solid rgba(0,0,0,0.08);
            padding: 15px;
            background: var(--soft-blue-tint); 
            box-shadow: 10px 10px 25px rgba(0,0,0,0.1);
            border-radius: 4px;
            box-sizing: border-box;
            z-index: 1;
        }

        .photo-container {
            width: 100%;
            height: 650px; /* Portrait height */
            background: #111;
            overflow: hidden;
            border: 2px solid rgba(0,0,0,0.15);
        }

        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .yearbook-name {
            font-family: 'Playfair Display', serif;
            font-size: 2.6rem;
            color: var(--text-dark);
            margin: 15px 0 5px;
        }

        /* 2. ID CARD (LANDSCAPE & STAMPED BELOW) */
        .license-card {
            background-color: var(--butter-yellow);
            background-image: 
                linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
            background-size: 20px 20px;
            border: 12px solid transparent;
            border-image: radial-gradient(#222 25%, transparent 26%) 33% repeat;
            border-width: 16px;
            padding: 25px;
            color: var(--text-dark);
            box-shadow: 15px 15px 30px rgba(0,0,0,0.15);
            font-family: 'Courier New', Courier, monospace;
            
            /* STAMPED EFFECT */
            width: 110%; /* Makes it hang off the edges slightly */
            margin-top: -50px; /* Pulls it up to "overlap" like a sticker */
            transform: rotate(-2deg); 
            
            box-sizing: border-box;
            position: relative;
            z-index: 2; /* Sits on top of yearbook */
        }

        /* STICKERS / EMOJIS */
        .sticker {
            position: absolute;
            z-index: 10;
            filter: drop-shadow(3px 3px 2px rgba(0,0,0,0.15));
            pointer-events: none;
        }

        .star {
            width: 40px;
            height: 40px;
            background: var(--star-gold);
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
        }

        .s1 { top: -20px; left: 10px; transform: rotate(-10deg); }
        .s2 { bottom: -10px; right: 20px; font-size: 40px; } /* Strawberry */
        .s3 { top: 20%; right: -25px; font-size: 35px; transform: rotate(15deg); } /* Cherries */
        .s4 { top: -35px; right: 15%; font-size: 30px; } /* Lily */

        .license-header-group {
            text-align: right;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--accent-pink);
        }

        .license-title { font-size: 0.9rem; font-weight: 900; }
        .license-no { font-size: 0.8rem; font-weight: bold; }

        .license-main {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .id-photo-small {
            width: 100px;
            height: 100px;
            background: #fff;
            border: 2px solid #664d3d;
            padding: 3px;
            flex-shrink: 0;
        }

        .id-photo-small img { width: 100%; height: 100%; object-fit: cover; }

        .license-fields {
            font-size: 0.8rem;
            text-transform: uppercase;
            line-height: 2;
            flex-grow: 1;
            font-weight: bold;
        }

        .field-line {
            border-bottom: 1px dashed rgba(0,0,0,0.2);
            display: block;
        }

        .signature {
            font-family: 'Sacramento', cursive;
            font-size: 2.2rem;
            text-align: right;
            margin-top: 5px;
            border-top: 1px solid #222;
            float: right;
            min-width: 140px;
        }

        .back-link {
            text-decoration: none;
            color: var(--text-dark);
            font-size: 0.9rem;
            font-weight: bold;
            opacity: 0.6;
            margin-bottom: 10px;
            display: block;
        }

        @media (max-width: 600px) {
            .license-card { width: 100%; margin-top: -20px; transform: rotate(0); }
            .photo-container { height: 450px; }
        }
    </style>
</head>
<body>

<div class="page-container">
    <a href="index.html" class="back-link">← BACK</a>
    <h1>Student Profile</h1>

    <div class="yearbook-frame">
        <div class="photo-container">
            <img src="highschoolyearbook.jpg" alt="Yearbook Photo">
        </div>
        <div class="yearbook-name">Aditi K</div>
        <div style="font-family: 'Playfair Display'; font-style: italic; color: #5d4a3e;">
            "I'm not killing people, I'm killing boys."
        </div>
    </div>

    <div class="license-card">
        <div class="sticker star s1"></div>
        <div class="sticker s2">🍓</div>
        <div class="sticker s3">🍒</div>
        <div class="sticker s4">🌸</div>

        <div class="license-header-group">
            <div class="license-title">PERMANENT LICENSE OF TRAVEL</div>
            <div class="license-no">NO. AK6252026</div>
        </div>
        
        <div class="license-main">
            <div class="id-photo-small">
                <img src="highschoolyearbook.jpg" alt="ID Photo">
            </div>
            <div class="license-fields">
                <span class="field-line">NAME: <b>ADITI K</b></span>
                <span class="field-line">ISSUE: <b>2026</b></span>
                <span class="field-line">EXPIRY: <b>PERMANENT</b></span>
            </div>
        </div>

        <div class="signature">Aditi</div>
        <div style="clear:both;"></div>
    </div>
</div>

</body>
</html>
