<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>About Me - Stamped Edition</title>
    <style>
        /* Added Mrs Saint Delafield for a superior calligraphic signature */
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,500;1,700&family=Quicksand:wght@300;500&family=Mrs+Saint+Delafield&display=swap');

        :root {
            --bg-vintage: #e8e2d6;       
            --id-blue: #b4c5d6;         
            --text-dark: #2c241e;       
            --stamp-red: rgba(163, 59, 59, 0.8); 
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            background-color: var(--bg-vintage);
            background-image: url("https://www.transparenttextures.com/patterns/parchment.png");
            font-family: 'Quicksand', sans-serif;
            overflow-x: hidden;
        }

        .page-container {
            width: 100%;
            max-width: 1100px;
            margin: 20px auto;
            position: relative;
            padding: 20px;
        }

        /* JOURNAL: Bold, Large, Centered */
        .back-link {
            text-decoration: none;
            color: var(--text-dark);
            font-size: 3rem; 
            font-weight: bold;
            opacity: 0.9;
            text-align: center;
            display: block;
            margin: 40px auto;
            letter-spacing: 12px;
            font-family: 'Playfair Display', serif;
            transition: opacity 0.3s;
        }

        .back-link:hover { opacity: 0.6; }

        /* INTRODUCTION: Top Left Label */
        h1 {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.4rem; 
            color: var(--text-dark);
            position: absolute;
            top: 20px;
            left: 20px;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-bottom: 1px solid var(--text-dark);
        }

        .content-wrapper {
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            margin-top: 60px;
            gap: 30px;
        }

        /* 1. YEARBOOK FRAME */
        .yearbook-frame {
            width: 380px;
            border: 12px solid #fff; 
            padding: 10px;
            background: #fff; 
            box-shadow: 8px 8px 20px rgba(0,0,0,0.1);
            flex-shrink: 0;
        }

        .photo-container {
            width: 100%;
            height: 460px; 
            background: #222;
            overflow: hidden;
        }

        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .yearbook-name {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--text-dark);
            margin: 15px 0 5px;
            text-align: center;
        }

        /* 2. ID CARD - Blue & Landscape */
        .license-card {
            background-color: var(--id-blue);
            background-image: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 20px 20px;
            border: 1px solid #9fb0c1;
            padding: 30px;
            color: #1e2b37;
            box-shadow: 12px 12px 30px rgba(0,0,0,0.15);
            font-family: 'Courier New', Courier, monospace;
            width: 580px;       
            height: 320px;      
            position: relative;
            transform: rotate(0.5deg); 
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .license-header-group {
            border-bottom: 1.5px solid #1e2b37;
            padding-bottom: 8px;
            margin-bottom: 25px;
        }

        .license-title { font-size: 1.2rem; font-weight: 900; letter-spacing: 1px; }

        .license-main {
            display: flex;
            gap: 25px;
        }

        .id-photo-small {
            width: 110px;
            height: 140px;
            border: 1px solid #1e2b37;
            background: #fff;
            padding: 3px;
        }

        .id-photo-small img { width: 100%; height: 100%; object-fit: cover; filter: contrast(1.1) grayscale(0.2); }

        .license-fields {
            font-size: 0.9rem;
            text-transform: uppercase;
            line-height: 2;
            font-weight: bold;
        }

        .field-line {
            border-bottom: 1px dashed rgba(0,0,0,0.15);
            display: block;
        }

        /* NEW CALLIGRAPHIC SIGNATURE */
        .signature {
            font-family: 'Mrs Saint Delafield', cursive;
            font-size: 4rem; /* Larger for better impact */
            color: #1a3a5a; 
            position: absolute;
            bottom: 10px;
            right: 40px;
            z-index: 5;
            line-height: 1;
        }

        /* STAMP */
        .official-stamp {
            position: absolute;
            bottom: 30px;
            left: 240px; /* Shifted to avoid signature clash */
            width: 85px;
            height: 85px;
            border: 3px solid var(--stamp-red);
            border-radius: 50%;
            color: var(--stamp-red);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 0.6rem;
            transform: rotate(-20deg);
            mix-blend-mode: multiply;
        }

        .stamp-inner {
            border: 1px solid var(--stamp-red);
            border-radius: 50%;
            width: 90%;
            height: 90%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        @media (max-width: 950px) {
            .content-wrapper { flex-direction: column; align-items: center; }
            .license-card { width: 100%; max-width: 500px; height: auto; }
            h1 { position: static; text-align: center; margin-bottom: 15px; }
        }
    </style>
</head>
<body>

<div class="page-container">
    <h1>INTRODUCTION</h1>
    
    <a href="home.html" class="back-link">JOURNAL</a>

    <div class="content-wrapper">
        <div class="yearbook-frame">
            <div class="photo-container">
                <img src="highschoolyearbook.jpeg" alt="Yearbook Portrait">
            </div>
            <div class="yearbook-name">K ADITI</div>
            <div style="font-family: 'Playfair Display'; font-style: italic; color: #5d4a3e; text-align: center; padding: 10px; font-size: 0.85rem;">
                "I'm not killing people, I'm killing boys."
            </div>
        </div>

        <div class="license-card">
            <div class="license-header-group">
                <div class="license-title">IDENTITY RECORD: 001</div>
                <div style="font-size: 0.7rem; opacity: 0.8;">FACULTY OF CREATIVE ARTS</div>
            </div>
            
            <div class="license-main">
                <div class="id-photo-small">
                    <img src="mug shot.jpeg" alt="ID Photo">
                </div>
                <div class="license-fields">
                    <span class="field-line">HOLDER: <b>ADITI K.</b></span>
                    <span class="field-line">ORIGIN: <b>MAY 22, 2008</b></span>
                    <span class="field-line">ROLE: <b>LEAD CREATIVE</b></span>
                    <span class="field-line">ACCESS: <b>UNRESTRICTED</b></span>
                </div>
            </div>

            <div class="official-stamp">
                <div class="stamp-inner">
                    <span>VERIFIED</span>
                    <span>2026</span>
                </div>
            </div>
            
            <div class="signature">Aditi</div>
        </div>
    </div>
</div>

</body>
</html>
