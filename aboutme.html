<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>About Me - Stamped Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,500;1,700&family=Quicksand:wght@300;500&family=Sacramento&display=swap');

        :root {
            /* Vintage Paper / Scrapbook Theme Colors */
            --bg-vintage: #e8e2d6;       /* Aged paper cream */
            --soft-blue-tint: #d0deeb; 
            --license-yellow: #f4cf6d;    /* More "Official" government document yellow */
            --text-dark: #2c241e;       /* Sepia-toned dark text */
            --accent-red: #a33b3b;      /* Stamp ink red */
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            background-color: var(--bg-vintage);
            /* Subtle paper texture effect */
            background-image: url("https://www.transparenttextures.com/patterns/parchment.png");
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        .page-container {
            width: 100%;
            max-width: 900px;
            margin: 60px auto;
            position: relative;
            padding: 20px;
        }

        .back-link {
            text-decoration: none;
            color: var(--text-dark);
            font-size: 1.2rem; /* Adjusted for readability */
            font-weight: bold;
            opacity: 0.7;
            margin-bottom: 20px;
            display: inline-block;
            letter-spacing: 2px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 3.5rem;
            color: var(--text-dark);
            margin-bottom: 40px;
            text-align: center; /* Replaced <centre> tag */
        }

        /* 1. YEARBOOK - Now Straight Sticked */
        .yearbook-frame {
            width: 420px;
            border: 8px solid #fff; /* Classic white photo border */
            padding: 10px;
            background: #fff; 
            box-shadow: 5px 5px 15px rgba(0,0,0,0.15);
            position: relative;
            transform: rotate(0deg); /* Made it straight */
            z-index: 1;
        }

        .photo-container {
            width: 100%;
            height: 500px; 
            background: #222;
            overflow: hidden;
        }

        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: sepia(0.2); /* Slight vintage filter */
        }

        .yearbook-name {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: var(--text-dark);
            margin: 10px 0 0;
            text-align: center;
        }

        /* 2. ID CARD - Shorter height, Longer width, Original Colors */
        .license-card {
            background-color: var(--license-yellow);
            /* Added a subtle "official document" watermark pattern */
            background-image: repeating-linear-gradient(45deg, rgba(0,0,0,0.02) 0px, rgba(0,0,0,0.02) 2px, transparent 2px, transparent 10px);
            
            border: 2px solid #b58d3d;
            padding: 20px;
            color: #3d2b1f;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.25);
            font-family: 'Courier New', Courier, monospace;
            
            /* Sizing & Position */
            width: 550px;       /* Longer */
            height: 280px;      /* Shorter */
            position: absolute;
            right: -80px;      /* Pushed to the right */
            top: 320px;         /* Non-uniform vertical offset */
            transform: rotate(5deg); 
            z-index: 2;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .sticker {
            position: absolute;
            z-index: 10;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.2));
        }
        .s1 { top: -15px; left: -10px; font-size: 40px; transform: rotate(-15deg); }
        .s2 { bottom: 10px; right: 10px; font-size: 30px; } 

        .license-header-group {
            border-bottom: 2px solid var(--accent-red);
            padding-bottom: 5px;
            margin-bottom: 10px;
        }

        .license-title { font-size: 1rem; font-weight: 900; color: var(--accent-red); }
        .license-no { font-size: 0.75rem; letter-spacing: 1px; }

        .license-main {
            display: flex;
            gap: 15px;
            align-items: flex-start;
        }

        .id-photo-small {
            width: 90px;
            height: 110px;
            border: 1px solid #000;
            background: #eee;
        }

        .id-photo-small img { width: 100%; height: 100%; object-fit: cover; grayscale: 0.3; }

        .license-fields {
            font-size: 0.75rem;
            text-transform: uppercase;
            line-height: 1.5;
            flex-grow: 1;
        }

        .field-line {
            border-bottom: 1px solid rgba(0,0,0,0.1);
            display: block;
            margin-bottom: 2px;
        }

        .signature {
            font-family: 'Sacramento', cursive;
            font-size: 2.5rem;
            color: #0c1c8a; /* Classic blue ink pen color */
            text-align: right;
            line-height: 0.8;
        }

        @media (max-width: 900px) {
            .page-container { display: flex; flex-direction: column; align-items: center; }
            .yearbook-frame { width: 90%; }
            .license-card { position: relative; width: 100%; right: 0; top: 20px; height: auto; transform: none; }
        }
    </style>
</head>
<body>

<div class="page-container">
    <a href="home.html" class="back-link">JOURNAL →</a>
    
    <h1>INTRODUCTION</h1>

    <div class="yearbook-frame">
        <div class="photo-container">
            <img src="highschoolyearbook.jpeg" alt="Yearbook Portrait">
        </div>
        <div class="yearbook-name">K ADITI</div>
        <div style="font-family: 'Playfair Display'; font-style: italic; color: #5d4a3e; text-align: center; padding: 10px;">
            "I'm not killing people, I'm killing boys."
        </div>
    </div>

    <div class="license-card">
        <div class="sticker s1">💅🏼</div>
        <div class="sticker s2">🌸</div>

        <div class="license-header-group">
            <div class="license-title">PERMANENT LICENSE OF DIVA</div>
            <div class="license-no">ID: AK-2205-08</div>
        </div>
        
        <div class="license-main">
            <div class="id-photo-small">
                <img src="mug shot.jpeg" alt="ID Photo">
            </div>
            <div class="license-fields">
                <span class="field-line">NAME: <b>ADITI K</b></span>
                <span class="field-line">DOB: <b>22/05/2008</b></span>
                <span class="field-line">CLASS: <b>A-CLASS</b></span>
                <span class="field-line">STATUS: <b>ADDICTIVE</b></span>
                <span class="field-line">EXP: <b>NEVER</b></span>
            </div>
        </div>
        
        <div style="display: flex; justify-content: space-between; align-items: flex-end;">
            <div style="font-size: 0.6rem; max-width: 60%; font-weight: bold; color: #5d4a3e;">
                OFFICIAL DOCUMENT: AUTHORIZED FOR LOOKING BETTER THAN THE COMPETITION.
            </div>
            <div class="signature">Aditi</div>
        </div>
    </div>
</div>

</body>
</html>
