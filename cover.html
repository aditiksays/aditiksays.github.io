<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Journal | 2026</title>
    <style>
        :root {
            --journal-red: #7a1d2e; 
            --tablecloth: #fff5f7; 
            --binding: #5a1522;
        }

        body, html {
            height: 100%;
            margin: 0;
            background-color: var(--tablecloth);
            background-image: radial-gradient(#ffb7c5 10%, transparent 10%), 
                              radial-gradient(#ffb7c5 10%, transparent 10%);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        /* Perspective must be on the wrapper */
        .journal-wrapper {
            position: relative;
            perspective: 1200px;
            text-decoration: none;
            cursor: pointer;
        }

        .cover {
            width: 350px;
            height: 480px;
            background-color: var(--journal-red);
            border-radius: 5px 15px 15px 5px;
            box-shadow: 10px 15px 35px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            border-left: 10px solid var(--binding); 
            transition: transform 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-origin: left; /* Key for the book swing */
            z-index: 2;
        }

        /* This is a "fake" page behind the cover to give it thickness */
        .journal-wrapper::before {
            content: '';
            position: absolute;
            top: 5px;
            left: 5px;
            width: 350px;
            height: 470px;
            background: white;
            border-radius: 5px 15px 15px 5px;
            z-index: 1;
        }

        .journal-wrapper:hover .cover {
            transform: rotateY(-35deg);
        }

        .title-container {
            display: flex;
            gap: 5px;
        }

        .letter {
            background: white;
            color: #333;
            padding: 8px 12px;
            font-size: 1.8rem;
            font-weight: bold;
            box-shadow: 3px 3px 0px rgba(0,0,0,0.2);
        }

        .letter:nth-child(even) { transform: rotate(-3deg); }
        .letter:nth-child(odd) { transform: rotate(2deg); }

        .sticker {
            position: absolute;
            pointer-events: none;
        }

        .note-sticker {
            position: absolute;
            bottom: 30px;
            right: 20px;
            background: #fff;
            padding: 8px;
            transform: rotate(-5deg);
            font-size: 0.7rem;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="journal-wrapper" onclick="alert('Journal Opening...')">
        <div class="cover">
            <span class="sticker" style="top: 30px; left: 30px; font-size: 2.5rem;">⭐</span>
            <span class="sticker" style="bottom: 80px; left: 40px; font-size: 2.5rem;">🎸</span>
            
            <div class="title-container">
                <div class="letter">J</div>
                <div class="letter">O</div>
                <div class="letter">U</div>
                <div class="letter">R</div>
                <div class="letter">N</div>
                <div class="letter">A</div>
                <div class="letter">L</div>
            </div>
            
            <p style="color: white; opacity: 0.6; font-size: 0.8rem; margin-top: 20px;">CLICK TO OPEN</p>
            
            <div class="note-sticker">Don't be so hard on yourself... :)</div>
        </div>
    </div>

</body>
</html>
