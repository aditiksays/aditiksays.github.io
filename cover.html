<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Journal | 2026</title>
    <style>
        :root {
            --journal-red: #7a1d2e; /* Deep Red-Brown from inspo */
            --tablecloth: #fff5f7; /* Soft floral-ish pink */
        }

        body, html {
            height: 100%;
            margin: 0;
            overflow: hidden;
            background-color: var(--tablecloth);
            /* Floral tablecloth pattern approximation */
            background-image: radial-gradient(#ffb7c5 10%, transparent 10%), 
                              radial-gradient(#ffb7c5 10%, transparent 10%);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
        }

        /* The Journal Container */
        .journal-wrapper {
            position: relative;
            perspective: 1000px;
            text-decoration: none;
        }

        .cover {
            width: 380px;
            height: 520px;
            background-color: var(--journal-red);
            border-radius: 5px 15px 15px 5px;
            box-shadow: 15px 20px 50px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            border-left: 12px solid #5a1522; /* Binding shade */
            transition: transform 0.5s ease;
        }

        /* Gingham Bookmark Detail from Image 2 */
        .gingham-tab {
            position: absolute;
            top: 20px;
            right: -10px;
            width: 60px;
            height: 80px;
            background-color: white;
            background-image: linear-gradient(90deg, rgba(0,0,255,.1) 50%, transparent 50%),
                              linear-gradient(rgba(0,0,255,.1) 50%, transparent 50%);
            background-size: 10px 10px;
            border: 1px solid #ccc;
            transform: rotate(5deg);
            z-index: 1;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        }

        /* Ransom Note Style Lettering from Image 1 */
        .title-container {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
        }

        .letter {
            background: white;
            color: #333;
            padding: 8px 12px;
            font-size: 2rem;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 3px 3px 0px rgba(0,0,0,0.2);
        }

        /* Vary the letters for that "cut out" look */
        .letter:nth-child(even) { transform: rotate(-3deg); background: #f0f0f0; }
        .letter:nth-child(odd) { transform: rotate(2deg); padding: 10px 8px; }

        .sticker {
            position: absolute;
            filter: drop-shadow(2px 2px 0px rgba(0,0,0,0.1));
            pointer-events: none;
        }

        /* "Open Me" Note */
        .note-sticker {
            position: absolute;
            bottom: 40px;
            right: 30px;
            background: #fff;
            padding: 10px;
            border: 1px solid #ddd;
            transform: rotate(-5deg);
            font-size: 0.8rem;
            color: #555;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

        .journal-wrapper:hover .cover {
            transform: rotateY(-10deg) rotateX(5deg);
        }

        .enter-text {
            color: rgba(255,255,255,0.7);
            margin-top: 30px;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <a href="home.html" class="journal-wrapper">
        <div class="gingham-tab"></div>
        
        <div class="cover">
            <span class="sticker" style="top: 30px; left: 40px; font-size: 3rem;">⭐</span>
            <span class="sticker" style="top: 60px; right: 50px; font-size: 2.5rem;">🪐</span>
            <span class="sticker" style="bottom: 100px; left: 50px; font-size: 3rem;">🎸</span>

            <div class="title-container">
                <div class="letter">J</div>
                <div class="letter">O</div>
                <div class="letter">U</div>
                <div class="letter">R</div>
                <div class="letter">N</div>
                <div class="letter">A</div>
                <div class="letter">L</div>
            </div>

            <div class="enter-text">Click to open</div>

            <div class="note-sticker">
                Don't be so hard on yourself... :)
            </div>
        </div>
    </a>

</body>
</html>
