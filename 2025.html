<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Cherry Digital Journal</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --cherry-dark: #4a0404;
            --cherry-mid: #800020;
            --condensed-milk: #FFF8E7;
            --serif: 'Playfair Display', serif;
            --sans: 'Montserrat', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            /* --- BACKGROUND IMAGE PLACEHOLDER --- */
            /* Replace 'your-image-name.jpg' with your actual file name */
            background-image: url('download.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            
            /* Fallback color if image doesn't load */
            background-color: var(--cherry-dark); 
            
            color: var(--beige); /* Global text is now dark */
            font-family: var(--sans);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* --- Header & Sticky Navigation --- */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            /* Light glass effect for header */
            background: rgba(255, 248, 231, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(74, 4, 4, 0.1);
        }

        .search-container {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .search-bar {
            background: rgba(74, 4, 4, 0.05);
            border: 1px solid rgba(74, 4, 4, 0.2);
            padding: 10px 25px;
            border-radius: 50px;
            color: var(--cherry-dark);
            width: 220px;
            outline: none;
            text-align: center;
            transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .search-bar:focus { width: 350px; border-color: var(--cherry-dark); }

        .menu-trigger { cursor: pointer; letter-spacing: 3px; text-transform: uppercase; font-size: 0.9rem; color: var(--cherry-dark); }

        /* --- Slide-in Menu --- */
        .side-drawer {
            position: fixed;
            top: 0;
            right: -320px;
            width: 320px;
            height: 100%;
            background: var(--cherry-dark);
            z-index: 1001;
            transition: right 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            display: flex;
            flex-direction: column;
            padding: 100px 50px;
            box-shadow: -20px 0 60px rgba(0,0,0,0.4);
        }

        .side-drawer.active { right: 0; }

        .side-drawer a {
            color: var(--condensed-milk);
            text-decoration: none;
            font-family: var(--serif);
            font-size: 2.2rem;
            margin-bottom: 30px;
            font-style: italic;
        }

        /* --- Content Layout --- */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 80px 20px;
            position: relative;
            z-index: 20; 
        }

        .journal-post {
            /* POSTS ARE NOW DARK */
            background: var(--cherry-dark);
            color: var(--condensed-milk);
            padding: 80px;
            margin-bottom: 120px;
            box-shadow: 20px 20px 40px rgba(0,0,0,0.3);
            transform: rotate(-0.5deg);
        }

        .journal-post:nth-child(even) { transform: rotate(0.8deg); }

        h2 { font-family: var(--serif); font-size: 3.5rem; margin-bottom: 25px; line-height: 1.1; }

        .post-date { font-size: 0.75rem; letter-spacing: 5px; text-transform: uppercase; opacity: 0.6; display: block; margin-bottom: 15px; }

        .post-body { font-size: 1.15rem; line-height: 1.8; margin-bottom: 40px; }

        /* --- Media Placeholder --- */
        .featured-media {
            width: 100%;
            height: 500px;
            background: rgba(74, 4, 4, 0.1);
            border: 2px dashed var(--cherry-dark);
            margin: 80px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--serif);
            font-style: italic;
            color: var(--cherry-dark);
        }

        /* --- Stickers --- */
        #sticker-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .sticker {
            position: absolute;
            width: 140px;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sticker img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: drop-shadow(5px 5px 10px rgba(0,0,0,0.2));
        }

        .sticker-label {
            position: absolute;
            font-size: 9px;
            background: var(--cherry-dark);
            color: var(--condensed-milk);
            padding: 2px 5px;
            top: -10px;
            white-space: nowrap;
        }

        /* --- Mobile Responsive --- */
        @media (max-width: 768px) {
            .journal-post { padding: 40px 25px; transform: none !important; }
            .sticker { display: none; }
            h2 { font-size: 2.5rem; }
            .search-bar { width: 140px; }
        }
    </style>
</head>
<body>

    <div id="sticker-layer"></div>

    <header>
        <div style="font-family: var(--serif); font-size: 1.2rem; font-weight: bold;">MEMOIR.</div>
        <div class="search-container">
            <input type="text" class="search-bar" placeholder="SEARCH...">
        </div>
        <div class="menu-trigger" onclick="toggleMenu()">MENU //</div>
    </header>

    <nav class="side-drawer" id="sideDrawer">
        <div class="menu-trigger" style="text-align: right; margin-bottom: 20px; color: var(--condensed-milk);" onclick="toggleMenu()">CLOSE X</div>
        <a href="home.html" onclick="toggleMenu()">HOME</a>
        <a href="aboutme.html" onclick="toggleMenu()">ABOUT</a>
        <a href="blog.html" onclick="toggleMenu()">BLOG</a>
        <a href="contact.html" onclick="toggleMenu()">CONTACT</a>
    </nav>

    <div class="container">
        <main id="journal-feed"></main>
    </div>

    <script>
        const stickerUrls = [
            "https://via.placeholder.com/150?text=STICKER_1", 
            "https://via.placeholder.com/150?text=STICKER_2",
            "https://via.placeholder.com/150?text=STICKER_3",
            "https://via.placeholder.com/150?text=STICKER_4",
            "https://via.placeholder.com/150?text=STICKER_5",
            "https://via.placeholder.com/150?text=STICKER_6",
            "https://via.placeholder.com/150?text=STICKER_7",
            "https://via.placeholder.com/150?text=STICKER_8",
            "https://via.placeholder.com/150?text=STICKER_9",
            "https://via.placeholder.com/150?text=STICKER_10"
        ];

        const posts = [
            { title: "Crimson Solitude", date: "NOV 15, 2026", content: "There is a specific kind of clarity that comes with isolation. Surrounded by the deep reds of this study, I finally find the words that have been eluding me all season." },
            { title: "The Dust of Archives", date: "NOV 12, 2026", content: "History is not a static line; it is a collection of fragments. Today I found a pressed flower inside a book from 1890. Its color was gone, but its shape was a perfect ghost." },
            { title: "Ink and Shadow", date: "NOV 09, 2026", content: "The way the candle light dances across the paper makes the words feel alive. Sometimes I think the shadows are writing back to me." },
            { title: "Resonance", date: "NOV 05, 2026", content: "After seeing the visual centerpiece, the narrative takes a turn toward the abstract. We are more than the sum of our experiences; we are the echo they leave behind." },
            { title: "Final Winter Note", date: "OCT 28, 2026", content: "The temperature dropped ten degrees in an hour. The journal feels colder to the touch. Winter is no longer a promise; it is a presence." }
        ];

        function renderFeed() {
            const feed = document.getElementById('journal-feed');
            let html = '';

            posts.forEach((post, index) => {
                html += `
                    <article class="journal-post">
                        <span class="post-date">${post.date}</span>
                        <h2>${post.title}</h2>
                        <div class="post-body"><p>${post.content}</p></div>
                        <div style="border-top: 1px solid rgba(255,248,231,0.2); padding-top: 20px;">
                            <small style="font-style:italic; letter-spacing: 1px;">Leave a reflection...</small>
                        </div>
                    </article>
                `;
                if (index === 2) {
                    html += `<div class="featured-media">PLACEHOLDER_FOR_FEATURED_MEDIA_AFTER_3RD_POST</div>`;
                }
            });
            feed.innerHTML = html;
        }

        function spawnStickers() {
            const layer = document.getElementById('sticker-layer');
            const totalHeight = document.body.scrollHeight;
            
            for (let i = 0; i < 10; i++) {
                const sticker = document.createElement('div');
                sticker.className = 'sticker';
                
                const yPos = (totalHeight / 11) * (i + 1) + (Math.random() * 200 - 100);
                const xPos = Math.random() > 0.5 ? (Math.random() * 12) : (82 + Math.random() * 6);
                const rot = Math.random() * 40 - 20;

                sticker.style.top = `${yPos}px`;
                sticker.style.left = `${xPos}%`;
                sticker.style.transform = `rotate(${rot}deg)`;
                
                sticker.innerHTML = `
                    <span class="sticker-label">STICKER ${i+1}</span>
                    <img src="${stickerUrls[i]}" alt="Sticker ${i+1}">
                `;
                
                layer.appendChild(sticker);
            }
        }

        function toggleMenu() {
            document.getElementById('sideDrawer').classList.toggle('active');
        }

        window.onload = () => {
            renderFeed();
            setTimeout(spawnStickers, 300);
        };
    </script>
</body>
</html>
