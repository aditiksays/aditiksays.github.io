<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postcard Memoirs</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Lato:wght@400;700&family=Reenie+Beanie&display=swap" rel="stylesheet">
    <style>
        :root {
            --post-cream: #FCFAF2;
            --airmail-blue: #1A4B84;
            --airmail-red: #C62828;
            --stamp-gold: #D4AF37;
            --ink: #33322E;
            --desk-bg: #EAE7E0;
            --serif: 'Cormorant Garamond', serif;
            --sans: 'Lato', sans-serif;
            --handwriting: 'Reenie Beanie', cursive;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--desk-bg);
            color: var(--ink);
            font-family: var(--sans);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* --- Header & Glass Search --- */
        header {
            position: sticky;
            top: 0;
            height: 80px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 1000;
            border-bottom: 6px solid transparent;
            border-image: repeating-linear-gradient(45deg, var(--airmail-red), var(--airmail-red) 15px, white 15px, white 30px, var(--airmail-blue) 30px, var(--airmail-blue) 45px, white 45px, white 60px) 10;
        }

        .search-bar {
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.1);
            padding: 10px 25px;
            border-radius: 50px;
            width: 250px;
            outline: none;
            transition: width 0.3s ease;
        }

        .search-bar:focus { width: 320px; background: white; }

        .menu-btn { cursor: pointer; font-weight: bold; letter-spacing: 2px; color: var(--airmail-blue); }

        /* --- Nav Drawer --- */
        .nav-drawer {
            position: fixed;
            top: 0; right: -320px;
            width: 320px; height: 100%;
            background: var(--post-cream);
            z-index: 2000;
            transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1);
            padding: 80px 40px;
            box-shadow: -10px 0 30px rgba(0,0,0,0.1);
        }
        .nav-drawer.open { right: 0; }
        .nav-drawer a {
            display: block;
            font-family: var(--serif);
            font-size: 2.2rem;
            text-decoration: none;
            color: var(--ink);
            margin-bottom: 25px;
        }

        /* --- Main Feed --- */
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        .postcard {
            background: var(--post-cream);
            padding: 50px;
            margin-bottom: 80px;
            box-shadow: 15px 15px 40px rgba(0,0,0,0.08);
            border: 1px solid #E0DED7;
            position: relative;
        }

        .postcard-grid {
            display: grid;
            grid-template-columns: 1.2fr 1px 0.8fr;
            gap: 40px;
        }

        .vertical-line { background: #E0DED7; height: 100%; }

        .post-date {
            font-family: var(--handwriting);
            font-size: 1.8rem;
            color: var(--airmail-red);
            display: block;
            margin-bottom: 15px;
        }

        h2 { font-family: var(--serif); font-size: 2.8rem; line-height: 1.1; margin-bottom: 20px; }

        .message-body { font-size: 1.1rem; line-height: 1.7; color: #444; }

        .stamp-area {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .stamp {
            width: 85px; height: 110px;
            border: 2px dashed var(--stamp-gold);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.65rem; color: var(--stamp-gold);
            text-align: center; transform: rotate(5deg);
            margin-bottom: 40px;
        }

        .address-lines div {
            border-bottom: 1px solid #CCC;
            height: 35px;
            width: 100%;
            margin-bottom: 10px;
        }

        /* --- Comments Logic --- */
        .comment-box {
            margin-top: 40px;
            padding-top: 25px;
            border-top: 1px dashed #CCC;
        }

        .comment-list {
            list-style: none;
            margin-bottom: 20px;
            font-family: var(--handwriting);
            font-size: 1.4rem;
            color: var(--airmail-blue);
        }

        .comment-input-wrap { display: flex; gap: 10px; }
        .comment-input-wrap input {
            flex: 1; padding: 10px; border: 1px solid #DDD; outline: none;
        }
        .comment-input-wrap button {
            background: var(--airmail-blue); color: white; border: none; padding: 0 20px; cursor: pointer;
        }

        /* --- Stickers --- */
        .sticker {
            position: absolute;
            width: 150px; height: 150px;
            z-index: 5; pointer-events: none;
            display: flex; flex-direction: column; align-items: center;
        }
        .sticker-img-placeholder {
            width: 100px; height: 100px;
            background: white; border: 1px solid #DDD;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.6rem; color: #999;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.05);
        }
        .sticker-label {
            margin-top: 8px; font-family: var(--handwriting);
            background: var(--airmail-blue); color: white;
            padding: 2px 10px; font-size: 1.1rem;
        }

        /* --- Media Break --- */
        .image-break {
            width: 100vw; height: 400px;
            background: #D8D4CC;
            margin: 60px 0;
            position: relative; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; justify-content: center;
            font-family: var(--serif); font-size: 1.8rem; font-style: italic;
        }

        @media (max-width: 768px) {
            .postcard-grid { grid-template-columns: 1fr; }
            .vertical-line { display: none; }
            .sticker { display: none; }
            .search-bar { width: 140px; }
            header { padding: 0 20px; }
        }
    </style>
</head>
<body>

    <div id="sticker-container"></div>

    <header>
        <div style="font-family: var(--serif); font-size: 1.3rem;">MEMOIR POST</div>
        <input type="text" class="search-bar" placeholder="Search a memory...">
        <div class="menu-btn" onclick="toggleMenu()">MENU</div>
    </header>

    <nav class="nav-drawer" id="navDrawer">
        <div class="menu-btn" style="text-align: right; margin-bottom: 40px;" onclick="toggleMenu()">CLOSE X</div>
        <a href="#">THE LOGS</a>
        <a href="#">GALLERY</a>
        <a href="#">COLLECTIONS</a>
        <a href="#">ABOUT</a>
    </nav>

    <div class="container">
        <main id="journal-feed"></main>
    </div>

    <script>
        // 1. DATA ARRAY
        const journalEntries = [
            { 
                id: 1, 
                title: "Winds of Change", 
                date: "April 17, 2026", 
                body: "I finally arrived at the northern coast. The air is brisk and smells of pine and salt. I spent most of the day just listening to the waves hitting the rocks below.",
                replies: ["I wish I was there!", "Stay warm!"]
            },
            { 
                id: 2, 
                title: "The Old Library", 
                date: "April 12, 2026", 
                body: "Found a bookstore tucked away in an alleyway. It smelled of vanilla and aged paper. I bought a map from the 1920s that shows islands that don't exist anymore.",
                replies: ["What a discovery."]
            },
            { 
                id: 3, 
                title: "Neon Rain", 
                date: "April 09, 2026", 
                body: "The city looks different when it's wet. The reflections of the neon signs look like melted candy on the pavement. A stark contrast to the quiet coast.",
                replies: []
            },
            { 
                id: 4, 
                title: "Mountain Silence", 
                date: "April 03, 2026", 
                body: "Climbed high enough that the clouds were beneath me. There is a specific kind of silence up here that makes you feel very small, but very alive.",
                replies: ["Breathtaking."]
            },
            { 
                id: 5, 
                title: "Final Departure", 
                date: "March 28, 2026", 
                body: "Packing the bags for the last time. My suitcase is mostly books and souvenirs now. It’s funny how a place can change you in just a few weeks.",
                replies: ["Safe travels home."]
            }
        ];

        // 2. RENDER ENGINE
        function renderPosts() {
            const feed = document.getElementById('journal-feed');
            let html = '';

            journalEntries.forEach((entry, index) => {
                html += `
                <article class="postcard" style="transform: rotate(${Math.random() * 2 - 1}deg)">
                    <div class="postcard-grid">
                        <div class="message-side">
                            <span class="post-date">${entry.date}</span>
                            <h2>${entry.title}</h2>
                            <p class="message-body">${entry.body}</p>
                        </div>
                        <div class="vertical-line"></div>
                        <div class="stamp-area">
                            <div class="stamp">AFFIX<br>STAMP<br>HERE</div>
                            <div class="address-lines">
                                <div>To: My Future Self</div>
                                <div>123 Somewhere Lane</div>
                                <div>The Beyond</div>
                            </div>
                        </div>
                    </div>

                    <section class="comment-box">
                        <ul class="comment-list" id="list-${entry.id}">
                            ${entry.replies.map(r => `<li>• ${r}</li>`).join('')}
                        </ul>
                        <div class="comment-input-wrap">
                            <input type="text" id="input-${entry.id}" placeholder="Write a reply...">
                            <button onclick="postComment(${entry.id})">SEND</button>
                        </div>
                    </section>
                </article>
                `;

                if (index === 2) {
                    html += `<div class="image-break">[ FEATURED_TRAVEL_IMAGE_PLACEHOLDER ]</div>`;
                }
            });
            feed.innerHTML = html;
        }

        // 3. COMMENT ACTION
        function postComment(id) {
            const input = document.getElementById(`input-${id}`);
            const list = document.getElementById(`list-${id}`);
            if (input.value.trim() !== "") {
                const li = document.createElement('li');
                li.innerText = `• ${input.value}`;
                list.appendChild(li);
                input.value = "";
            }
        }

        // 4. STICKER GENERATOR (10 Placeholders)
        function spawnStickers() {
            const container = document.getElementById('sticker-container');
            const pageHeight = document.body.scrollHeight;

            for (let i = 1; i <= 10; i++) {
                const sticker = document.createElement('div');
                sticker.className = 'sticker';
                
                const top = (pageHeight / 11) * i + (Math.random() * 150);
                const left = Math.random() > 0.5 ? (Math.random() * 10) : (85 + Math.random() * 5);
                
                sticker.style.top = `${top}px`;
                sticker.style.left = `${left}%`;
                sticker.style.transform = `rotate(${Math.random() * 40 - 20}deg)`;
                
                sticker.innerHTML = `
                    <div class="sticker-img-placeholder">IMG_STICKER_${i}</div>
                    <div class="sticker-label">Memento #${i}</div>
                `;
                container.appendChild(sticker);
            }
        }

        // 5. NAVIGATION
        function toggleMenu() {
            document.getElementById('navDrawer').classList.toggle('open');
        }

        window.onload = () => {
            renderPosts();
            setTimeout(spawnStickers, 400); // Wait for content to define height
        };
    </script>
</body>
</html>
