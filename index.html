<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journal Cover</title>
    <style>
        :root {
            --baby-pink: #fce4ec;
            --deep-pink: #f8bbd0;
            --cream: #fffdf5;
            --lace-white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--baby-pink);
            /* Soft cream diamond pattern */
            background-image:  linear-gradient(30deg, var(--cream) 12%, transparent 12.5%, transparent 87%, var(--cream) 87.5%, var(--cream)),
            linear-gradient(150deg, var(--cream) 12%, transparent 12.5%, transparent 87%, var(--cream) 87.5%, var(--cream)),
            linear-gradient(30deg, var(--cream) 12%, transparent 12.5%, transparent 87%, var(--cream) 87.5%, var(--cream)),
            linear-gradient(150deg, var(--cream) 12%, transparent 12.5%, transparent 87%, var(--cream) 87.5%, var(--cream)),
            linear-gradient(60deg, var(--deep-pink) 25%, transparent 25.5%, transparent 75%, var(--deep-pink) 75%, var(--deep-pink)),
            linear-gradient(60deg, var(--deep-pink) 25%, transparent 25.5%, transparent 75%, var(--deep-pink) 75%, var(--deep-pink));
            background-size: 80px 140px;
            background-position: 0 0, 0 0, 40px 70px, 40px 70px, 0 0, 40px 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Georgia', serif;
        }

        /* The Main Journal Cover */
        .journal-cover {
            position: relative;
            width: 85vw;
            height: 85vh;
            background: var(--cream);
            border: 15px solid white;
            outline: 2px solid var(--deep-pink);
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 10vh;
        }

        /* Title Styling */
        .title-area {
            text-align: center;
        }

        .title-word {
            display: inline-flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .letter-tile {
            background: white;
            border: 1px solid var(--deep-pink);
            padding: 10px 15px;
            font-size: 2rem;
            color: #d81b60;
            box-shadow: 3px 3px 0px var(--baby-pink);
            transform: rotate(var(--r));
        }

        /* The Envelope (Bottom Right) */
        .envelope-wrapper {
            position: absolute;
            bottom: -20px;
            right: 40px;
            transform: rotate(-10deg);
            transition: transform 0.3s ease;
        }

        .envelope-wrapper:hover {
            transform: rotate(-5deg) scale(1.05);
        }

        .envelope {
            position: relative;
            width: 200px;
            height: 120px;
            background: #fff;
            border: 2px solid var(--deep-pink);
            box-shadow: 5px 5px 15px rgba(0,0,0,0.05);
        }

        /* The Letter inside the envelope */
        .letter-content {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 180px;
            height: 140px;
            background: white;
            border: 1px solid #eee;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            color: var(--deep-pink);
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 -5px 10px rgba(0,0,0,0.05);
        }

        /* Envelope Flap (Opened) */
        .envelope::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 100px solid transparent;
            border-right: 100px solid transparent;
            border-bottom: 70px solid var(--baby-pink);
            top: -70px;
        }

        /* Sticker Placeholders */
        .sticker {
            position: absolute;
            width: 60px;
            height: 60px;
            cursor: pointer;
            transition: 0.2s;
            z-index: 5;
            /* Replace background-image with your URL later */
            background-size: contain;
            background-repeat: no-repeat;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.1));
        }

        .sticker:hover { transform: scale(1.1) rotate(5deg); }

        /* Specific Sticker Positions around the envelope */
        #sticker1 { bottom: 130px; right: 180px; transform: rotate(-15deg); background-image: url('YOUR_IMAGE_HERE'); border: 2px dashed #ffc1e3; }
        #sticker2 { bottom: 50px; right: 260px; transform: rotate(10deg); background-image: url('YOUR_IMAGE_HERE'); border: 2px dashed #ffc1e3; }
        #sticker3 { bottom: 180px; right: 40px; transform: rotate(5deg); background-image: url('YOUR_IMAGE_HERE'); border: 2px dashed #ffc1e3; }

    </style>
</head>
<body>

    <div class="journal-cover">
        
        <div class="title-area">
            <div class="title-word">
                <span class="letter-tile" style="--r: -3deg">M</span>
                <span class="letter-tile" style="--r: 2deg">Y</span>
            </div>
            <br>
            <div class="title-word">
                <span class="letter-tile" style="--r: 1deg">D</span>
                <span class="letter-tile" style="--r: -2deg">I</span>
                <span class="letter-tile" style="--r: 4deg">G</span>
                <span class="letter-tile" style="--r: -1deg">I</span>
                <span class="letter-tile" style="--r: 3deg">T</span>
                <span class="letter-tile" style="--r: -3deg">A</span>
                <span class="letter-tile" style="--r: 2deg">L</span>
            </div>
            <br>
            <div class="title-word">
                <span class="letter-tile" style="--r: -2deg">J</span>
                <span class="letter-tile" style="--r: 1deg">O</span>
                <span class="letter-tile" style="--r: -4deg">U</span>
                <span class="letter-tile" style="--r: 3deg">R</span>
                <span class="letter-tile" style="--r: -1deg">N</span>
                <span class="letter-tile" style="--r: 2deg">A</span>
                <span class="letter-tile" style="--r: -3deg">L</span>
            </div>
        </div>

        <a href="#" class="sticker" id="sticker1" title="Sticker 1"></a>
        <a href="#" class="sticker" id="sticker2" title="Sticker 2"></a>
        <a href="#" class="sticker" id="sticker3" title="Sticker 3"></a>

        <div class="envelope-wrapper">
            <a href="home.html" class="letter-content">
                Open Me ♡
            </a>
            <div class="envelope"></div>
        </div>

    </div>

</body>
</html>
