<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Digital Journal</title>
    <style>
        :root {
            --blue: #a2d2ff;
            --white: #ffffff;
            --lace-color: #f8f9fa;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            /* Blue and White Checkered Pattern */
            background-color: var(--white);
            background-image: 
                linear-gradient(45deg, var(--blue) 25%, transparent 25%), 
                linear-gradient(-45deg, var(--blue) 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, var(--blue) 75%), 
                linear-gradient(-45deg, transparent 75%, var(--blue) 75%);
            background-size: 40px 40px;
            background-position: 0 0, 0 20px, 20px -20px, -20px 0px;
        }

        /* Lace Border Container */
        .journal-page {
            position: relative;
            width: 80%;
            max-width: 600px;
            background: white;
            padding: 60px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 20px solid transparent;
            /* Scalloped Lace Border Effect */
            border-image: radial-gradient(circle, var(--lace-color) 70%, transparent 72%) 20%;
            border-image-slice: 30;
            border-image-repeat: round;
            text-align: center;
        }

        /* Title Styling (Separated Letters) */
        .title-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 40px;
        }

        .letter {
            background: #fff;
            padding: 10px 15px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #444;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
            position: relative;
            transform: rotate(var(--rotation));
        }

        /* Washi Tape Effect on Letters */
        .letter::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 20%;
            width: 60%;
            height: 15px;
            background: rgba(162, 210, 255, 0.5); /* Semi-transparent blue tape */
            border-left: 2px solid rgba(0,0,0,0.05);
            border-right: 2px solid rgba(0,0,0,0.05);
        }

        /* Link Styling */
        .enter-link {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 25px;
            background: var(--blue);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: transform 0.2s;
            box-shadow: 0 4px 0px #7fb5e6;
        }

        .enter-link:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="journal-page">
        <div class="title-container">
            <span class="letter" style="--rotation: -2deg">M</span>
            <span class="letter" style="--rotation: 3deg">Y</span>
            <span style="width: 20px;"></span> <span class="letter" style="--rotation: 1deg">D</span>
            <span class="letter" style="--rotation: -3deg">I</span>
            <span class="letter" style="--rotation: 2deg">G</span>
            <span class="letter" style="--rotation: 4deg">I</span>
            <span class="letter" style="--rotation: -1deg">T</span>
            <span class="letter" style="--rotation: 2deg">A</span>
            <span class="letter" style="--rotation: -2deg">L</span>
            <span style="width: 20px;"></span> <span class="letter" style="--rotation: 3deg">J</span>
            <span class="letter" style="--rotation: -2deg">O</span>
            <span class="letter" style="--rotation: 1deg">U</span>
            <span class="letter" style="--rotation: -4deg">R</span>
            <span class="letter" style="--rotation: 2deg">N</span>
            <span class="letter" style="--rotation: 4deg">A</span>
            <span class="letter" style="--rotation: -2deg">L</span>
        </div>

        <p>Every thought deserves a soft place to land.</p>

        <a href="home.html" class="enter-link">Open Journal →</a>
    </div>

</body>
</html>
