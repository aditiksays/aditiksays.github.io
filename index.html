<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Journal</title>
    <style>
        /* 1. FONTS */
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,500&family=Quicksand:wght@300;500&display=swap');

        /* 2. COLORS & VARIABLES */
        :root {
            --journal-blue: #8ba3bc;
            --ribbon-blue: #5a7d9a;
            --text-color: #5d7082;
            --lace-white: #f8f8f8;
        }

        /* 3. FULL SCREEN LANDSCAPE SETUP */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #d1d9e0;
            font-family: 'Quicksand', sans-serif;
        }

        .cover {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-color: var(--journal-blue);
            /* Linen Texture Effect */
            background-image: 
                linear-gradient(90deg, rgba(255,255,255,.05) 50%, transparent 50%),
                linear-gradient(rgba(255,255,255,.08) 50%, transparent 50%);
            background-size: 4px 4px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 8% 10%;
            box-sizing: border-box;
            box-shadow: inset 30px 0 50px rgba(0,0,0,0.1);
        }

        /* Spine Shadow on the left */
        .cover::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 60px;
            background: linear-gradient(to right, rgba(0,0,0,0.15), transparent);
            border-right: 1px solid rgba(0,0,0,0.05);
        }

        /* 4. TEXT STYLING (The "Pressed" Effect) */
        .title {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 8vw; /* Responsive size */
            color: var(--text-color);
            line-height: 0.85;
            text-shadow: -1px -1px 1px rgba(255,255,255,0.4), 1px 1px 1px rgba(0,0,0,0.2);
            opacity: 0.9;
        }

        .subtitle-area {
            color: var(--text-color);
            opacity: 0.8;
        }

        .author {
            font-size: 38px;
            font-weight: bold;
            letter-spacing: 8px;
            margin-bottom: 15px;
        }

        .intro {
            font-size: 14px;
            max-width: 500px;
            line-height: 1.8;
        }

        /* 5. DECORATIONS */
        .ribbon {
            position: absolute;
            right: 12%;
            top: 0;
            bottom: 0;
            width: 35px;
            background-color: var(--ribbon-blue);
            box-shadow: inset 3px 0 7px rgba(0,0,0,0.2), 3px 0 7px rgba(0,0,0,0.1);
            background-image: repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(255,255,255,0.05) 3px);
        }

    .bow-sticker {
    position: absolute;
    /* 1. Positioning: Aiming for the right-center of the envelope */
    /* Envelope is at top: 32%, so we put the bow slightly lower than before */
    top: 38%;      
    right: 9%;     /* Moves it onto the right side of the envelope */
    
    /* 2. Controlled Size */
    width: 150px;  
    height: 120px; 
    
    /* 3. The "Pin" Effect: Small scale and right-leaning tilt */
    /* Adjust scale(1.2) to make it slightly bigger or smaller */
    transform: rotate(35deg) scale(1.2); 
    transform-origin: center;

    /* 4. Layering */
    z-index: 100; 
    background-image: url('greenbow.png'); 
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    
    /* 5. Allows clicking the envelope underneath */
    pointer-events: none; 
}

        /* 6. THE ENVELOPE & CIRCLE PHOTO */
        .envelope-link {
            position: absolute;
            top: 32%;
            right: 7%;
            width: 240px;
            height: 280px;
            background-color: #3b5a7a; 
            transform: rotate(6deg);
            padding: 15px;
            box-shadow: 10px 10px 25px rgba(0,0,0,0.2);
            text-decoration: none;
            transition: all 0.4s ease;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .envelope-link:hover {
            transform: rotate(0deg) scale(1.05);
        }

        /* The Circle "Cookie Cutter" */
        .photo-inner {
            width: 100%;
            height: 210px; /* Adjust height to fit inside the envelope */
            background: white;
            border-radius: 50%; /* This creates the circle */
            border: 10px solid var(--lace-white);
            overflow: hidden; /* This crops the image into the circle */
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        .photo-inner img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* This makes the image fill the circle perfectly */
        }

        .open-label {
            color: white;
            text-align: center;
            font-size: 14px;
            margin-top: 15px;
            font-weight: 500;
        }
/* Placeholder Sticker Styles */
.mini-sticker {
    position: absolute;
    width: 95px; /* Adjust size as needed */
    height: 95px;
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    z-index: 6; /* Sits above the ribbon, below the envelope hover */
    cursor: pointer;
    transition: transform 0.3s;
}

.mini-sticker:hover {
    transform: scale(1.1); /* Subtle hover effect */
}

/* Specific Positions on the Ribbon below the envelope */

/* Sticker 1: Near the open label, slightly tilted */
#s1 {
    bottom: 22%; /* Positioned from the bottom of the screen */
    right: 21%;   /* Positioned near the ribbon's left edge */
    transform: rotate(12deg); /* "Random" tilt */
    /* REPLACE WITH YOUR IMAGE LINK */
    background-image: url('staricon.png'); 
}

/* Sticker 2: Further down the ribbon, tilted the other way */
#s2 {
    bottom: 10%; /* Closer to the bottom */
    right: 10%;   /* Placed more to the right */
    transform: rotate(-8deg); /* "Random" tilt */
    /* REPLACE WITH YOUR IMAGE LINK */
    background-image: url('strawberryicon.png'); 
}
    </style>
</head>
<body>

    <div class="cover">
        <div class="ribbon"></div>
        
        <div class="title">
            my<br>digital<br>Journal
        </div>
<br>
        <div class="subtitle-area">
            <div class="author"> K Aditi</div>
            <div class="intro">
           I am trying to figure out myself, along with being cunty!
          </div>
        </div>

        <div class="bow-sticker"></div>

        <a href="home.html" class="envelope-link">
            <div class="photo-inner">
                <img src="journalphoto.jpg" alt="Journal Photo">
            </div>
            <div class="open-label"> <b>Open Journal</b> 🍓</div>
        </a>
    </div>
    <a href="home.html" class="envelope-link">
            <div class="photo-inner">
                <img src="journalphoto.jpg" alt="Journal Photo">
            </div>
            <div class="open-label">Open Journal ♡</div>
        </a>

        <div class="mini-sticker" id="s1" title="Sticker Place 1"></div>
        <div class="mini-sticker" id="s2" title="Sticker Place 2"></div>

    </div>

</body>
</html>
