<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>Digital Journal</title>
    
    <style>
        /* 1. FONTS */
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,500&family=Quicksand:wght@300;500&family=Sacramento&family=Dancing+Script:wght@500&display=swap');

        :root {
            --journal-blue: #8ba3bc;
            --ribbon-blue: #5a7d9a;
            --text-color: #5d7082;
            --lace-white: #f8f8f8;
        }

        /* 2. CORE LAYOUT */
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #d1d9e0;
            font-family: 'Quicksand', sans-serif;
            overflow-x: hidden;
            overflow-y: auto; /* Allows pull-to-refresh */
        }

        .cover {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-color: var(--journal-blue);
            background-image: 
                linear-gradient(90deg, rgba(255,255,255,.05) 50%, transparent 50%),
                linear-gradient(rgba(255,255,255,.08) 50%, transparent 50%);
            background-size: 4px 4px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; /* Moved content to top */
            padding: 5% 10%;
            box-sizing: border-box;
            box-shadow: inset 30px 0 50px rgba(0,0,0,0.1);
        }

        /* Spine Shadow */
        .cover::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0; width: 60px;
            background: linear-gradient(to right, rgba(0,0,0,0.15), transparent);
            z-index: 2;
        }

        /* 3. TEXT STYLING */
        .title {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 7vw;
            color: var(--text-color);
            line-height: 0.85;
            text-shadow: -1px -1px 1px rgba(255,255,255,0.4), 1px 1px 1px rgba(0,0,0,0.2);
            margin-top: 20px; /* Adjust this to move "My Digital Diary" higher/lower */
            z-index: 3;
        }

        .subtitle-area {
            margin-top: 30px;
            z-index: 3;
        }

        .author {
            font-family: 'Dancing Script', cursive; /* New aesthetic font */
            font-size: 42px;
            color: var(--text-color);
            margin-bottom: 5px;
        }

        .intro {
            font-family: 'Quicksand', sans-serif;
            font-size: 16px;
            font-style: italic;
            color: var(--text-color);
            max-width: 400px;
            line-height: 1.6;
            opacity: 0.9;
        }

        /* 4. DECORATIONS */
        .ribbon {
            position: absolute;
            right: 12%; top: 0; bottom: 0; width: 35px;
            background-color: var(--ribbon-blue);
            box-shadow: inset 3px 0 7px rgba(0,0,0,0.2), 3px 0 7px rgba(0,0,0,0.1);
            background-image: repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(255,255,255,0.05) 3px);
            z-index: 1;
        }

        .bow-sticker {
            position: absolute;
            top: 30%; right: 5%;
            width: 150px; height: 120px;
            transform: rotate(35deg) scale(1.2);
            z-index: 100;
            background: url('greenbow.png') no-repeat center/contain;
            pointer-events: none;
        }

        /* 5. ENVELOPE */
        .envelope-link {
            position: absolute;
            top: 32%; right: 7%;
            width: 240px; height: 280px;
            background-color: #3b5a7a; 
            transform: rotate(6deg);
            padding: 15px;
            box-shadow: 10px 10px 25px rgba(0,0,0,0.2);
            text-decoration: none;
            transition: all 0.4s ease;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .envelope-link:hover { transform: rotate(0deg) scale(1.05); }

        .photo-inner {
            width: 100%; height: 210px;
            background: white;
            border-radius: 50%;
            border: 8px solid var(--lace-white);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .photo-inner img { width: 100%; height: 100%; object-fit: cover; }

        .open-label {
            color: white;
            margin-top: 15px;
            font-size: 14px;
            font-weight: 500;
            font-family: 'Quicksand', sans-serif;
        }

        /* 6. STICKERS (Compressed) */
        .mini-sticker {
            position: absolute;
            width: 95px; height: 95px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 6;
            transition: transform 0.3s;
            cursor: pointer;
        }
        .mini-sticker:hover { transform: scale(1.1); }

        #s1 { bottom: 22%; right: 21%; transform: rotate(12deg); background-image: url('staricon.png'); }
        #s2 { bottom: 10%; right: 10%; transform: rotate(-8deg); background-image: url('strawberryicon.png'); }

        /* 7. MOBILE RESPONSIVENESS */
        @media (max-width: 600px) {
            .cover {
                height: auto;
                min-height: 100vh;
                padding: 15% 5%;
                align-items: center;
                justify-content: flex-start;
            }
            .title { font-size: 15vw; text-align: center; }
            .subtitle-area { text-align: center; display: flex; flex-direction: column; align-items: center; }
            
            .envelope-link {
                position: relative;
                top: 0 !important; right: 0 !important;
                margin: 40px auto;
                transform: rotate(0deg) !important;
            }
            .bow-sticker {
                top: -30px; right: -10px;
                width: 110px;
            }
            .mini-sticker {
                position: relative;
                display: inline-block;
                margin: 15px;
                right: auto !important; bottom: auto !important;
            }
            .ribbon { display: none; } /* Hide ribbon on mobile to reduce clutter */
        }
    </style>
</head>
<body>

    <div class="cover">
        <div class="ribbon"></div>
        
        <div class="title">my<br>digital<br>Journal</div>

        <div class="subtitle-area">
            <div class="author">K Aditi</div>
            <div class="intro">
                I am trying to figure out myself, along with being cunty!
            </div>
        </div>

        <div class="bow-sticker"></div>

        <a href="home.html" class="envelope-link">
            <div class="photo-inner">
                <img src="journalphoto.jpg" alt="Journal Photo">
            </div>
            <div class="open-label"><b>Open Journal</b> 🍓</div>
        </a>

        <div class="sticker-container" style="text-align: center;">
            <div class="mini-sticker" id="s1" title="Star"></div>
            <div class="mini-sticker" id="s2" title="Strawberry"></div>
        </div>
    </div>

</body>
</html>
