<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Journal 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,500&family=Quicksand:wght@300;500&display=swap');

        :root {
            --journal-blue: #8ba3bc;
            --ribbon-blue: #5a7d9a;
            --text-color: #5d7082;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f0f0;
            font-family: 'Quicksand', sans-serif;
        }

        /* The Book Cover */
        .cover {
            position: relative;
            width: 900px;
            height: 600px;
            background-color: var(--journal-blue);
            /* Linen Texture Effect */
            background-image: 
                linear-gradient(90deg, rgba(255,255,255,.07) 50%, transparent 50%),
                linear-gradient(rgba(255,255,255,.1) 50%, transparent 50%);
            background-size: 3px 3px;
            box-shadow: 20px 20px 60px rgba(0,0,0,0.2), inset 10px 0 20px rgba(0,0,0,0.1);
            border-radius: 5px 20px 20px 5px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 60px;
            box-sizing: border-box;
        }

        /* Spine Shadow */
        .cover::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 40px;
            background: linear-gradient(to right, rgba(0,0,0,0.1), transparent);
            border-right: 1px solid rgba(0,0,0,0.05);
        }

        /* Debossed (Pressed-in) Text Effect */
        .title {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 80px;
            color: var(--text-color);
            line-height: 0.9;
            margin-top: 40px;
            /* This creates the "stamped" look */
            text-shadow: -1px -1px 1px rgba(255,255,255,0.3), 1px 1px 1px rgba(0,0,0,0.2);
            opacity: 0.8;
        }

        .subtitle-area {
            margin-top: auto;
            color: var(--text-color);
            opacity: 0.7;
        }

        .year {
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 5px;
            margin-bottom: 10px;
        }

        .quote {
            font-size: 12px;
            max-width: 400px;
            line-height: 1.6;
        }

        /* Vertical Ribbon */
        .ribbon {
            position: absolute;
            right: 80px;
            top: 0;
            bottom: 0;
            width: 25px;
            background-color: var(--ribbon-blue);
            box-shadow: inset 2px 0 5px rgba(0,0,0,0.2), 2px 0 5px rgba(0,0,0,0.1);
            /* Ribbon Texture lines */
            background-image: repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(255,255,255,0.1) 3px);
        }

        /* The Envelope/Photo Link */
        .envelope-photo {
            position: absolute;
            bottom: 250px;
            right: 60px;
            width: 180px;
            height: 200px;
            background-color: #3b5a7a; /* Denim look */
            transform: rotate(5deg);
            padding: 15px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
            text-decoration: none;
            transition: transform 0.3s;
            z-index: 5;
        }

        .envelope-photo:hover {
            transform: rotate(0deg) scale(1.05);
        }

        .photo-inner {
            width: 100%;
            height: 80%;
            background: white;
            border-radius: 50%;
            border: 8px solid #eee; /* Lace-like border */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .photo-inner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Gingham Bow */
        .bow {
            position: absolute;
            top: 80px;
            right: 15px;
            width: 150px;
            height: 80px;
            background-image: 
                linear-gradient(white 2px, transparent 2px),
                linear-gradient(90deg, white 2px, transparent 2px),
                linear-gradient(rgba(186, 217, 140, 0.5) 50%, transparent 50%),
                linear-gradient(90deg, rgba(186, 217, 140, 0.5) 50%, transparent 50%);
            background-size: 15px 15px;
            background-color: #fff;
            clip-path: polygon(0% 0%, 100% 0%, 50% 50%, 100% 100%, 0% 100%, 50% 50%);
            z-index: 10;
        }

        /* Button on the Bow */
        .button-icon {
            position: absolute;
            top: 105px;
            right: 75px;
            width: 35px;
            height: 35px;
            background: #fffdf0;
            border-radius: 50%;
            border: 2px solid #ddd;
            z-index: 11;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

        /* Sticker Slots */
        .sticker {
            position: absolute;
            width: 40px;
            height: 40px;
            background-size: contain;
            background-repeat: no-repeat;
            z-index: 6;
        }
    </style>
</head>
<body>

    <div class="cover">
        <div class="ribbon"></div>
        
        <div class="title">
            digital<br>planner
        </div>

        <div class="subtitle-area">
            <div class="year">2026</div>
            <div class="quote">
                We believe that journaling not only can help you become more organized, but also can inspire and make your dreams come true.
            </div>
        </div>

        <a href="home.html" class="envelope-photo">
            <div class="photo-inner">
                <img src="https://via.placeholder.com/150" alt="Home">
            </div>
            <p style="color: white; text-align: center; font-size: 12px; margin-top: 10px;">Open Journal</p>
        </a>

        <div class="bow"></div>
        <div class="button-icon">⁛</div>

        <div class="sticker" style="bottom: 220px; right: 230px; background-image: url('STAR_URL');">⭐</div>
        <div class="sticker" style="bottom: 150px; right: 150px; background-image: url('FLOWER_URL');">🌸</div>
    </div>

</body>
</html>
