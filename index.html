<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Sweet Journal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&family=Quicksand:wght@500&display=swap');

        :root {
            --soft-pink: #ffdae9;
            --cream: #fffaf0;
            --lace: #ffffff;
            --accent: #ff85a1;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--soft-pink);
            /* Soft polka dot background instead of geometric shapes */
            background-image: radial-gradient(var(--cream) 20%, transparent 20%);
            background-size: 30px 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
        }

        /* The Journal Page with Lace Border */
        .journal-container {
            position: relative;
            width: 80vw;
            height: 85vh;
            background: var(--cream);
            border-radius: 50px; /* Rounded corners for a softer look */
            box-shadow: 0 15px 40px rgba(255, 133, 161, 0.2);
            padding: 40px;
            box-sizing: border-box;
            /* Lace Border Effect */
            border: 12px solid var(--lace);
            outline: 5px dotted var(--soft-pink);
            outline-offset: -20px;
        }

        /* Cutesy Title using Bubbles */
        .title-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }

        .word {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
        }

        .bubble-letter {
            width: 50px;
            height: 50px;
            background: white;
            border: 3px solid var(--soft-pink);
            border-radius: 50% 40% 60% 30%; /* Irregular "organic" rounds */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Cherry Bomb One', cursive;
            color: var(--accent);
            font-size: 1.8rem;
            box-shadow: 2px 4px 0px var(--soft-pink);
            transform: rotate(var(--r));
        }

        /* The Envelope (Hand-drawn look) */
        .envelope-link {
            position: absolute;
            bottom: 30px;
            right: 50px;
            width: 220px;
            height: 150px;
            background: white;
            border: 3px solid var(--accent);
            border-radius: 15px 15px 50px 15px; /* Irregular pocket shape */
            transform: rotate(-8deg);
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            z-index: 10;
        }

        .envelope-link:hover {
            transform: rotate(-3deg) scale(1.05);
        }

        /* Heart on the envelope */
        .envelope-link::after {
            content: '❤';
            position: absolute;
            top: 20%;
            left: 40%;
            font-size: 3rem;
            color: var(--soft-pink);
            opacity: 0.6;
        }

        .open-text {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: var(--accent);
            font-weight: bold;
            font-size: 1.2rem;
            z-index: 11;
        }

        /* Sticker Slots */
        .sticker-slot {
            position: absolute;
            width: 80px;
            height: 80px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 5;
            transition: 0.3s;
            /* Replace url with your images */
            background-image: url('PLACE_STICKER_URL_HERE');
        }

        .sticker-slot:hover {
            transform: scale(1.2) rotate(10deg);
        }

        #s1 { bottom: 180px; right: 40px; transform: rotate(15deg); }
        #s2 { bottom: 60px; right: 280px; transform: rotate(-10deg); }
        #s3 { bottom: 220px; right: 220px; transform: rotate(-5deg); }

    </style>
</head>
<body>

    <div class="journal-container">
        
        <div class="title-container">
            <div class="word">
                <span class="bubble-letter" style="--r: -5deg">M</span>
                <span class="bubble-letter" style="--r: 8deg">Y</span>
            </div>
            <div class="word">
                <span class="bubble-letter" style="--r: -3deg">D</span>
                <span class="bubble-letter" style="--r: 5deg">I</span>
                <span class="bubble-letter" style="--r: -7deg">G</span>
                <span class="bubble-letter" style="--r: 4deg">I</span>
                <span class="bubble-letter" style="--r: -2deg">T</span>
                <span class="bubble-letter" style="--r: 6deg">A</span>
                <span class="bubble-letter" style="--r: -4deg">L</span>
            </div>
            <div class="word">
                <span class="bubble-letter" style="--r: 9deg">J</span>
                <span class="bubble-letter" style="--r: -5deg">O</span>
                <span class="bubble-letter" style="--r: 3deg">U</span>
                <span class="bubble-letter" style="--r: -6deg">R</span>
                <span class="bubble-letter" style="--r: 2deg">N</span>
                <span class="bubble-letter" style="--r: -8deg">A</span>
                <span class="bubble-letter" style="--r: 4deg">L</span>
            </div>
        </div>

        <div class="sticker-slot" id="s1" title="Put sticker here"></div>
        <div class="sticker-slot" id="s2" title="Put sticker here"></div>
        <div class="sticker-slot" id="s3" title="Put sticker here"></div>

        <a href="home.html" class="envelope-link">
            <div class="open-text">Open me ♡</div>
        </a>

    </div>

</body>
</html>
