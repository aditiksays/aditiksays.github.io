<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCRAPBOOK | 2026</title>
    <style>
        :root {
            --journal-brown: #4a3728; /* Deep Red-Brown / Dark Journal color */
            --binding-dark: #36281e;
            --page-cream: #fff9e6;
        }

        body, html {
            height: 100%;
            margin: 0;
            overflow: hidden;
            /* The whole page is now the dark journal brown */
            background-color: var(--journal-brown);
            /* Added a subtle leather/paper texture effect */
            background-image: url('https://www.transparenttextures.com/patterns/leather.png');
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
        }

        .journal-link {
            text-decoration: none;
            perspective: 1200px;
        }

        /* The Hardcover */
        .cover {
            width: 380px;
            height: 540px;
            background-color: #7a1d2e; /* The deep red of the specific journal inspo */
            border-radius: 5px 20px 20px 5px;
            box-shadow: 30px 30px 80px rgba(0,0,0,0.6);
            border-left: 15px solid #5a1522; /* Binding */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Lifting effect on hover */
        .journal-link:hover .cover {
            transform: rotateY(-15deg) rotateX(5deg) scale(1.03);
        }

        /* Ransom Note Style (Inspo 1) */
        .title-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .row { display: flex; gap: 6px; }

        .letter {
            background: white;
            color: #222;
            padding: 12px 16px;
            font-size: 2.2rem;
            font-weight: 900;
            box-shadow: 5px 5px 0px rgba(0,0,0,0.3);
            display: inline-block;
        }

        /* Random offsets for the "hand-cut" vibe */
        .letter:nth-child(odd) { transform: rotate(-4deg); background: #fcfcfc; }
        .letter:nth-child(even) { transform: rotate(3deg); background: #efefef; }

        /* Stickers (Inspo 1) */
        .sticker {
            position: absolute;
            font-size: 3rem;
            filter: drop-shadow(4px 4px 0px rgba(0,0,0,0.2));
            pointer-events: none;
        }

        .hint {
            margin-top: 50px;
            color: rgba(255,255,255,0.4);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: bold;
        }

        /* Paper Note (Inspo 2) */
        .tape-note {
            position: absolute;
            bottom: 40px;
            right: -30px;
            background: #fff;
            padding: 12px 15px;
            border: 1px solid #ddd;
            font-size: 0.8rem;
            transform: rotate(-8deg);
            color: #333;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.2);
            max-width: 150px;
            line-height: 1.4;
        }

        /* Gold corner accents for a "Premium" Journal look */
        .cover::after {
            content: '';
            position: absolute;
            top: 20px;
            right: 20px;
            width: 30px;
            height: 30px;
            border-top: 2px solid rgba(255,215,0,0.3);
            border-right: 2px solid rgba(255,215,0,0.3);
        }
    </style>
</head>
<body>

    <a href="home.html" class="journal-link">
        <div class="cover">
            <span class="sticker" style="top: 40px; left: 40px;">💫</span>
            <span class="sticker" style="bottom: 100px; left: 50px;">🎸</span>
            <span class="sticker" style="top: 80px; right: 50px;">🍒</span>

            <div class="title-wrap">
                <div class="row">
                    <div class="letter">M</div>
                    <div class="letter">Y</div>
                </div>
                <div class="row">
                    <div class="letter">W</div>
                    <div class="letter">O</div>
                    <div class="letter">R</div>
                    <div class="letter">L</div>
                    <div class="letter">D</div>
                </div>
            </div>

            <p class="hint">Open to Explore</p>

            <div class="tape-note">
                Don't be so hard on yourself; you're doing just fine :)
            </div>
        </div>
    </a>

</body>
</html>
