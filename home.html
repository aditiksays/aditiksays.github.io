<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrapbook Diary | Unique Borders</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-pattern: url('download (3).jpg'); 
            --paper-cream: #FFFDF5;
            --pastel-pink: #FFD1DC;
            --muted-red: #E5989B;
            --3d-shadow: 2px 4px 15px rgba(0,0,0,0.08);
            
            /* Define your 4 different border PNGs here */
            --border-top: url('border_top.png');
            --border-bottom: url('border_bottom.png');
            --border-left: url('border_left.png');
            --border-right: url('border_right.png');
        }

        body {
            background-image: var(--bg-pattern);
            background-size: 250px;
            background-repeat: repeat;
            font-family: 'Segoe UI', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 120px 20px 60px;
        }

        /* --- CENTERED NAVIGATION --- */
        nav {
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 1000;
            background: white;
            padding: 12px 30px;
            border-radius: 50px;
            border: 2px solid var(--pastel-pink);
            box-shadow: var(--3d-shadow);
        }

        nav a {
            text-decoration: none;
            color: var(--muted-red);
            font-weight: bold;
            font-size: 0.85rem;
            text-transform: uppercase;
            transition: 0.3s;
        }

        nav a.active, nav a:hover { color: var(--pastel-pink); }

        /* --- BENTO STRUCTURE --- */
        .page-wrapper {
            display: grid;
            grid-template-columns: 240px 1fr;
            gap: 40px;
            width: 100%;
            max-width: 1000px;
            z-index: 10;
        }

        /* --- UNIQUE BORDER LOGIC --- */
        .block {
            background: var(--paper-cream);
            padding: 40px;
            position: relative; /* Required for pseudo-elements */
            box-shadow: var(--3d-shadow);
            border-radius: 10px;
        }

        /* Top Border Sticker */
        .block::before {
            content: "";
            position: absolute;
            top: -15px; left: 0; right: 0; height: 30px;
            background: var(--border-top) center/contain no-repeat;
            z-index: 5;
        }

        /* Bottom Border Sticker */
        .block::after {
            content: "";
            position: absolute;
            bottom: -15px; left: 0; right: 0; height: 30px;
            background: var(--border-bottom) center/contain no-repeat;
            z-index: 5;
        }

        /* Left/Right Side Decorators */
        .side-borders::before, .side-borders::after {
            content: "";
            position: absolute;
            top: 0; bottom: 0; width: 30px;
            z-index: 5;
        }

        .side-borders::before {
            left: -15px;
            background: var(--border-left) center/contain no-repeat;
        }

        .side-borders::after {
            right: -15px;
            background: var(--border-right) center/contain no-repeat;
        }

        /* --- MINI CALENDAR --- */
        .calendar-mini { text-align: center; }
        .calendar-title { color: var(--muted-red); font-size: 1rem; margin-bottom: 10px; font-weight: bold; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; font-size: 0.7rem; }
        .day.active { background: var(--pastel-pink); color: white; border-radius: 50%; padding: 3px; }

        /* --- DIARY CONTENT --- */
        .page-container h1 {
            color: var(--muted-red);
            font-family: 'Georgia', serif;
            font-size: 1.8rem;
            margin-bottom: 20px;
            font-style: italic;
        }

        .page-container p {
            line-height: 2;
            color: #555;
            background-image: radial-gradient(#E5989B 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            padding: 10px;
        }
    </style>
</head>
<body>

    <nav>
        <a href="home.html" class="active">home</a>
        <a href="aboutme.html">about</a>
        <a href="blog.html">blog</a>
        <a href="contact.html">contact</a>
        <a href="feedback.html">feedback</a>
        <a href="index.html">index</a>
    </nav>

    <div class="page-wrapper">
        <aside class="block side-borders calendar-mini">
            <div class="calendar-title">🍒 April '26</div>
            <div class="calendar-grid">
                <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
                <span></span><span></span><span></span>
                <span>1</span><span>2</span><span>3</span><span class="day active">4</span>
                <span>5</span><span>6</span><span>7</span><span>8</span>
            </div>
            <div style="margin-top: 20px;">☎</div>
        </aside>

        <main class="block side-borders page-container">
            <h1>Entry #01: Welcome</h1>
            <p>
                This layout now uses 4 distinct image variables for each side. 
                Each block is wrapped in a "side-borders" class that handles the left and right PNGs, while the base block class handles the top and bottom.
            </p>
        </main>
    </div>

</body>
</html>
