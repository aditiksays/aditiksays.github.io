<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNFILTERED ARCHIVE // 2026</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@1,700&family=Montserrat:wght@300;900&family=Megrim&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #050505;
            --chrome: #ffffff;
            --accent: #ff0055;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.03) 1px, transparent 0);
            background-size: 40px 40px;
            color: var(--chrome);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        /* --- Search Bar (Top Center) --- */
        .search-container {
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 6000;
            width: 300px;
        }

        #blog-search {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 20px;
            border-radius: 30px;
            color: white;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            outline: none;
            text-align: center;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        #blog-search:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.1);
            width: 350px;
        }

        /* --- Fixed Header --- */
        header {
            position: fixed;
            top: 40px;
            right: 50px;
            z-index: 5000;
            text-align: right;
            mix-blend-mode: difference;
        }

        .menu-btn {
            font-family: 'Megrim', cursive;
            font-size: 2rem;
            cursor: pointer;
            letter-spacing: 5px;
        }

        /* --- THE CANVAS GRID --- */
        .scrapbook-canvas {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            max-width: 1400px;
            margin: 0 auto;
            padding: 180px 20px 100px;
            gap: 60px;
        }

        /* --- LEFT SIDE: VISUAL & STICKERS --- */
        .visual-container {
            position: sticky;
            top: 150px;
            height: fit-content;
        }

        .main-visual {
            position: relative;
            width: 100%;
            z-index: 5;
            transform: rotate(-0.5deg);
        }

        .main-visual img {
            width: 100%;
            filter: contrast(110%);
            border: 1px solid #1a1a1a;
            display: block;
        }

        /* Stickers: Reduced Size & Repositioned */
        .sticker {
            position: absolute;
            z-index: 100;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: grab;
            filter: drop-shadow(5px 5px 10px rgba(0,0,0,0.5));
        }

        .sticker:hover {
            transform: scale(1.15) rotate(0deg) !important;
            z-index: 1000;
        }

        /* Scaled down PNG sizes (approx 60px - 100px range) */
        .s1 { width: 70px; top: -20px; left: -10px; transform: rotate(-15deg); } 
        .s2 { width: 90px; top: 5%; right: 5%; transform: rotate(10deg); }  
        .s3 { width: 100px; top: 40%; left: -30px; transform: rotate(-12deg); }
        .s4 { width: 65px; bottom: 5%; right: -10px; transform: rotate(15deg); }
        .s5 { width: 85px; top: 20%; left: 10%; transform: rotate(-5deg); } 
        .s6 { width: 60px; top: -30px; right: 30%; transform: rotate(20deg); }
        .s7 { width: 80px; bottom: -20px; left: 15%; transform: rotate(-8deg); }
        .s8 { width: 75px; bottom: 35%; right: 10%; transform: rotate(-18deg); }

        /* --- RIGHT SIDE: BLOG FEED --- */
        .blog-feed {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .blog-entry {
            max-width: 450px;
            padding: 30px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s ease;
        }

        .blog-entry.hidden {
            display: none;
        }

        .blog-entry h2 {
            font-family: 'Bodoni Moda', serif;
            font-style: italic;
            font-size: 2.8rem;
            line-height: 1.1;
            margin-bottom: 15px;
        }

        .blog-entry p {
            font-size: 0.95rem;
            font-weight: 300;
            color: #bbb;
            line-height: 1.7;
        }

        .entry-meta {
            font-size: 0.7rem;
            letter-spacing: 4px;
            color: var(--accent);
            margin-bottom: 10px;
            display: block;
        }

        .bg-text {
            position: fixed;
            font-size: 20vw;
            font-weight: 900;
            color: rgba(255,255,255,0.02);
            z-index: -1;
            pointer-events: none;
        }

        @media (max-width: 900px) {
            .scrapbook-canvas { grid-template-columns: 1fr; padding-top: 150px; }
            .visual-container { position: relative; top: 0; margin-bottom: 50px; }
            .search-container { width: 80%; }
        }
    </style>
</head>
<body>

    <div class="search-container">
        <input type="text" id="blog-search" placeholder="Search Archive..." onkeyup="filterPosts()">
    </div>

    <header>
        <div class="menu-btn">MENU</div>
        <div style="font-size: 0.6rem; letter-spacing: 3px; margin-top: 5px; opacity: 0.4;">VOL. 01 / 2026</div>
    </header>

    <div class="bg-text" style="top: 0; left: -5%;">RAW</div>
    <div class="bg-text" style="bottom: 0; right: -5%;">CORE</div>

    <main class="scrapbook-canvas">
        <div class="visual-container">
            <div class="main-visual">
                <img src="newspaper cutout.png" alt="Archive Image">
                
                <img src="scrappedeyes.png" alt="st-1" class="sticker s1">
                <img src="inhumane text.png" alt="st-2" class="sticker s2">
                <img src="iamgod.png" alt="st-3" class="sticker s3">
                <img src="mouthstar.png" alt="st-4" class="sticker s4">
                <img src="maskedjennifer.png" alt="st-5" class="sticker s5">
                <img src="messystars.png" alt="st-6" class="sticker s6">
                <img src="handprint.png" alt="st-7" class="sticker s7">
                <img src="eyeinheart.png" alt="st-8" class="sticker s8">
            </div>
        </div>

        <div class="blog-feed" id="post-container"></div>
    </main>

    <script>
        const postData = [
            { meta: "01 // VISION", title: "The Main Character", body: "Confidence is the only accessory that matters. This season, we’re striping away the noise and focusing on high-contrast silhouettes that demand attention." },
            { meta: "02 // TEXTURE", title: "Silver & Spice", body: "Metallic dreams meeting concrete realities. Everything hits differently when it’s unfiltered. We are documenting the grit and the evolution of the aesthetic." },
            { meta: "03 // ARCHIVE", title: "Stay Glossy", body: "The archive is a living breathing organism. Layer by layer, we build the truth. Don't worry about the mess; the mess is where styling lives." }
        ];

        const container = document.getElementById('post-container');

        function loadPosts(data) {
            container.innerHTML = data.map(post => `
                <article class="blog-entry">
                    <span class="entry-meta">${post.meta}</span>
                    <h2>${post.title}</h2>
                    <p>${post.body}</p>
                </article>
            `).join('');
        }

        function filterPosts() {
            const query = document.getElementById('blog-search').value.toLowerCase();
            const filtered = postData.filter(post => 
                post.title.toLowerCase().includes(query) || 
                post.body.toLowerCase().includes(query) || 
                post.meta.toLowerCase().includes(query)
            );
            loadPosts(filtered);
        }

        // Initial load
        loadPosts(postData);
    </script>
</body>
</html>
