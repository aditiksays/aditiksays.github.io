<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNFILTERED ARCHIVE // 2026</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@1,700&family=Montserrat:wght@300;900&family=Megrim&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #433e40;
            --chrome: #ffffff;
            --accent: #ff0055;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 2px 2px, rgba(99, 4, 40, 0.884) 1px, transparent 0);
            background-size: 40px 40px;
            color: var(--chrome);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        /* --- SLIDE-IN MENU --- */
        #side-menu {
            position: fixed;
            top: 0;
            right: -100%;
            width: 300px;
            height: 100%;
            background: #1a1a1a;
            z-index: 9000;
            padding: 100px 40px;
            transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }

        #side-menu.active {
            right: 0;
        }

        .menu-link {
            display: block;
            font-family: 'Megrim', cursive;
            font-size: 2.5rem;
            color: white;
            text-decoration: none;
            margin-bottom: 25px;
        }

        .close-btn {
            position: absolute;
            top: 40px;
            right: 40px;
            font-size: 0.8rem;
            letter-spacing: 5px;
            cursor: pointer;
            color: var(--accent);
        }

        /* --- Search Bar (Top Center) --- */
        .search-container {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 6000;
            width: 250px;
        }

        #blog-search {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 15px;
            border-radius: 20px;
            color: white;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            outline: none;
            text-align: center;
            backdrop-filter: blur(8px);
        }

        /* --- Fixed Header --- */
        header {
            position: fixed;
            top: 40px;
            right: 50px;
            z-index: 5000;
            mix-blend-mode: difference;
        }

        .menu-btn {
            font-family: 'Megrim', cursive;
            font-size: 1.8rem;
            letter-spacing: 5px;
            cursor: pointer;
        }

        /* --- THE CANVAS GRID --- */
        .scrapbook-canvas {
            display: grid;
            grid-template-columns: 1fr 1fr;
            max-width: 1300px;
            margin: 0 auto;
            padding: 180px 20px;
            gap: 60px;
        }

        .visual-container {
            position: sticky;
            top: 150px;
            height: fit-content;
        }

        .main-visual {
            position: relative;
            width: 100%;
            max-width: 500px;
        }

        .main-visual img:not(.sticker) {
            width: 100%;
            display: block;
            border: none; /* Border removed */
        }

        /* --- STICKER SETTINGS (REVERTED TO 100PX) --- */
        .sticker {
            position: absolute;
            z-index: 100;
            pointer-events: auto;
            object-fit: contain;
            filter: drop-shadow(3px 3px 5px rgba(0,0,0,0.5));
        }

        .s1 { width: 100px !important; top: -10px; left: -10px; transform: rotate(-10deg); } 
        .s2 { width: 100px !important; top: 10px; right: 10px; transform: rotate(15deg); }  
        .s3 { width: 100px !important; top: 40%; left: -15px; transform: rotate(-20deg); }
        .s4 { width: 100px !important; bottom: 15px; right: -5px; transform: rotate(25deg); }
        .s5 { width: 100px !important; top: 20%; left: 20%; transform: rotate(-5deg); } 
        .s6 { width: 100px !important; top: -15px; right: 35%; transform: rotate(10deg); }
        .s7 { width: 100px !important; bottom: -10px; left: 15%; transform: rotate(-12deg); }
        .s8 { width: 100px !important; bottom: 35%; right: 15%; transform: rotate(-15deg); }

        /* --- RIGHT SIDE: BLOG FEED --- */
        .blog-feed {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .blog-entry {
            max-width: 450px;
            padding: 25px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .blog-entry h2 {
            font-family: 'Bodoni Moda', serif;
            font-style: italic;
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        .blog-entry p {
            font-size: 0.9rem;
            color: #aaa;
            line-height: 1.6;
        }

        .entry-meta {
            font-size: 0.6rem;
            letter-spacing: 3px;
            color: var(--accent);
            margin-bottom: 5px;
            display: block;
        }

        @media (max-width: 900px) {
            .scrapbook-canvas { grid-template-columns: 1fr; }
            .visual-container { position: relative; top: 0; }
        }
    </style>
</head>
<body>

    <nav id="side-menu">
        <div class="close-btn" onclick="toggleMenu()">CLOSE</div>
        <a href="home.html" class="menu-link">HOME</a>
        <a href="aboutme.html" class="menu-link">ABOUT</a>
        <a href="blog.html" class="menu-link">BLOG</a>
        <a href="contact.html" class="menu-link">CONTACT</a>
        <a href="index.html" class="menu-link">CLOSE</a>
    </nav>

    <div class="search-container">
        <input type="text" id="blog-search" placeholder="FILTER ARCHIVE..." onkeyup="filterPosts()">
    </div>

    <header>
        <div class="menu-btn" onclick="toggleMenu()">MENU</div>
    </header>

    <main class="scrapbook-canvas">
        <div class="visual-container">
            <div class="main-visual">
                <img src="newspaper cutout.png" alt="Archive Image" height="300px">
                <img src="scrappedeyes.png" class="sticker s1">
                <img src="inhumane text.png" class="sticker s2">
                <img src="iamgod.png" class="sticker s3">
                <img src="mouthstar.png" class="sticker s4">
                <img src="maskedjennifer.png" class="sticker s5">
                <img src="messystars.png" class="sticker s6">
                <img src="handprint.png" class="sticker s7">
                <img src="eyeinheart.png" class="sticker s8">
            </div>
        </div>
        <div class="blog-feed" id="post-container"></div>
    </main>

    <script>
        function toggleMenu() {
            document.getElementById('side-menu').classList.toggle('active');
        }

        const postData = [
            { meta: "01 // VISION", title: "The Main Character", body: "Confidence is the only accessory that matters. This season, we’re stripping away the noise." },
            { meta: "02 // TEXTURE", title: "Silver & Spice", body: "Metallic dreams meeting concrete realities. Everything hits differently when it’s unfiltered." },
            { meta: "03 // ARCHIVE", title: "Stay Glossy", body: "The archive is a living breathing organism. Layer by layer, we build the truth." }
        ];

        const container = document.getElementById('post-container');

        function loadPosts(data) {
            container.innerHTML = data.map(post => `
                <article class="blog-entry">
                    <span class="entry-meta">${post.meta}</span>
                    <h2>${post.title}</h2>
                    <p>${post.body}</p>
                </article>
            `).join('');
        }

        function filterPosts() {
            const query = document.getElementById('blog-search').value.toLowerCase();
            const filtered = postData.filter(post => 
                post.title.toLowerCase().includes(query) || 
                post.body.toLowerCase().includes(query)
            );
            loadPosts(filtered);
        }

        loadPosts(postData);
    </script>
</body>
</html>
