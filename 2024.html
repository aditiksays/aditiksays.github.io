<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNFILTERED ARCHIVE // 2026</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@1,700&family=Montserrat:wght@300;900&family=Megrim&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #050505;
            --chrome: #ffffff;
            --accent: #ff0055;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.03) 1px, transparent 0);
            background-size: 40px 40px;
            color: var(--chrome);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        /* --- Fixed Header --- */
        header {
            position: fixed;
            top: 40px;
            right: 50px;
            z-index: 5000;
            text-align: right;
            mix-blend-mode: difference;
        }

        .menu-btn {
            font-family: 'Megrim', cursive;
            font-size: 2rem;
            cursor: pointer;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        /* --- THE CANVAS GRID --- */
        .scrapbook-canvas {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Left for visual/stickers, Right for feed */
            max-width: 1400px;
            margin: 0 auto;
            padding: 150px 20px;
            gap: 40px;
        }

        /* --- LEFT SIDE: VISUAL & STICKERS --- */
        .visual-container {
            position: sticky;
            top: 150px;
            height: fit-content;
        }

        .main-visual {
            position: relative;
            width: 100%;
            z-index: 5;
            transform: rotate(-1.5deg);
        }

        .main-visual img {
            width: 100%;
            filter: grayscale(100%) contrast(115%);
            border: 1px solid #1a1a1a;
            display: block;
        }

        /* Stickers: Now relative to the main-visual container */
        .sticker {
            position: absolute;
            z-index: 100;
            filter: drop-shadow(15px 15px 30px rgba(0,0,0,0.8));
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: grab;
        }

        .sticker:hover {
            transform: scale(1.1) rotate(0deg) !important;
            z-index: 1000;
        }

        /* Positioning stickers over the image (Left Side) */
        .s1 { width: 180px; top: -40px; left: -20px; transform: rotate(-15deg); } 
        .s2 { width: 140px; top: 10%; right: -30px; transform: rotate(12deg); }  
        .s3 { width: 200px; bottom: 20%; left: -40px; transform: rotate(-20deg); }
        .s4 { width: 150px; bottom: -30px; right: 10%; transform: rotate(10deg); }
        .s5 { width: 160px; top: 40%; left: 10%; transform: rotate(-8deg); } 
        .s6 { width: 120px; top: -10px; right: 20%; transform: rotate(5deg); }
        .s7 { width: 180px; bottom: 5%; left: 30%; transform: rotate(-5deg); }
        .s8 { width: 130px; top: 60%; right: 5%; transform: rotate(-12deg); }

        /* --- RIGHT SIDE: BLOG FEED --- */
        .blog-feed {
            display: flex;
            flex-direction: column;
            gap: 100px; /* Space between posts */
        }

        .blog-entry {
            position: relative;
            max-width: 500px;
            /* Removed sticky-note look, added editorial spacing */
            padding-bottom: 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .blog-entry h2 {
            font-family: 'Bodoni Moda', serif;
            font-style: italic;
            font-size: 3.5rem;
            line-height: 1;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        .blog-entry p {
            font-size: 1rem;
            font-weight: 300;
            color: #ccc;
            line-height: 1.8;
            letter-spacing: 0.5px;
        }

        .entry-meta {
            font-size: 0.7rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 10px;
            display: block;
        }

        .bg-text {
            position: fixed;
            font-size: 20vw;
            font-weight: 900;
            color: rgba(255,255,255,0.02);
            z-index: -1;
            pointer-events: none;
        }

        @media (max-width: 900px) {
            .scrapbook-canvas { grid-template-columns: 1fr; }
            .visual-container { position: relative; top: 0; margin-bottom: 50px; }
            .sticker { display: none; }
        }
    </style>
</head>
<body>

    <header>
        <div class="menu-btn">MENU</div>
        <div style="font-size: 0.6rem; letter-spacing: 3px; margin-top: 5px; opacity: 0.4;">VOL. 01 / 2026</div>
    </header>

    <div class="bg-text" style="top: 0; left: -5%;">RAW</div>
    <div class="bg-text" style="bottom: 0; right: -5%;">CORE</div>

    <main class="scrapbook-canvas">
        
        <div class="visual-container">
            <div class="main-visual">
                <img src="newspaper cutout.png" alt="Archive Image">
                
                <img src="scrappedeyes.png" alt="st-1" class="sticker s1">
                <img src="inhumane text.png" alt="st-2" class="sticker s2">
                <img src="iamgod.png" alt="st-3" class="sticker s3">
                <img src="mouthstar.png" alt="st-4" class="sticker s4">
                <img src="maskedjennifer.png" alt="st-5" class="sticker s5">
                <img src="messystars.png" alt="st-6" class="sticker s6">
                <img src="handprint.png" alt="st-7" class="sticker s7">
                <img src="eyeinheart.png" alt="st-8" class="sticker s8">
            </div>
        </div>

        <div class="blog-feed" id="post-container">
            </div>

    </main>

    <script>
        // --- DYNAMIC POST DATA ---
        // To add a new post, just add a new {} block to this list.
        const postData = [
            {
                meta: "01 // VISION",
                title: "The Main Character",
                body: "Confidence is the only accessory that matters. This season, we’re striping away the noise and focusing on high-contrast silhouettes that demand attention without a single word."
            },
            {
                meta: "02 // TEXTURE",
                title: "Silver & Spice",
                body: "Metallic dreams meeting concrete realities. Everything hits differently when it’s unfiltered. We are documenting the grit, the glitter, and the evolution of the aesthetic."
            },
            {
                meta: "03 // ARCHIVE",
                title: "Stay Glossy",
                body: "The archive is a living breathing organism. Layer by layer, we build the truth. Don't worry about the mess; the mess is where the most honest styling lives."
            }
        ];

        const container = document.getElementById('post-container');

        // Logic to generate HTML for each post
        function loadPosts() {
            container.innerHTML = postData.map(post => `
                <article class="blog-entry">
                    <span class="entry-meta">${post.meta}</span>
                    <h2>${post.title}</h2>
                    <p>${post.body}</p>
                </article>
            `).join('');
        }

        loadPosts();
    </script>

</body>
</html>
