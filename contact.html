<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Scrapbook Diary</title>
    <style>
        /* Precision Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-pattern: url('[URL_FOR_ASSET]'); /* download (3).jpg */
            --paper-cream: #FFFDF5;
            --pastel-pink: #FFD1DC;
            --muted-red: #E5989B;
            --3d-shadow: 5px 8px 15px rgba(0,0,0,0.1);
            --lace-size: 80px; /* Enhanced border size */
        }

        body {
            background-image: var(--bg-pattern);
            background-size: 250px;
            background-repeat: repeat;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 140px 100px 100px; /* Padding for thick lace borders */
            position: relative;
            overflow-x: hidden;
        }

        /* --- SCREEN-EDGE LACE BORDERS --- */
        .lace-edge {
            position: fixed;
            z-index: 1000;
            pointer-events: none;
        }

        .lace-top, .lace-bottom {
            left: 0; width: 100%; height: var(--lace-size);
            background-image: url('[URL_FOR_BORDER_ASSET]'); /* border horizontal.png */
            background-repeat: repeat-x;
            background-size: auto var(--lace-size);
        }
        .lace-top { top: 0; }
        .lace-bottom { bottom: 0; transform: rotate(180deg); }

        .lace-left, .lace-right {
            top: 0; height: 100%; width: var(--lace-size);
            background-image: url('[URL_FOR_BORDER_ASSET]'); /* border vertical.png */
            background-repeat: repeat-y;
            background-size: var(--lace-size) auto;
        }
        .lace-left { left: 0; }
        .lace-right { right: 0; transform: rotate(180deg); }

        /* --- NAVIGATION --- */
        nav {
            position: fixed;
            top: 50px;
            display: flex;
            gap: 15px;
            z-index: 1100;
            background: white;
            padding: 10px 30px;
            border-radius: 50px;
            border: 1.5px solid var(--pastel-pink);
            box-shadow: var(--3d-shadow);
        }

        nav a {
            text-decoration: none;
            color: var(--muted-red);
            font-weight: 600;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        /* --- SCRAPBOOK CONTAINER --- */
        .workspace {
            position: relative;
            width: 100%;
            max-width: 800px;
            z-index: 10;
        }

        /* Main Contact Paper Block */
        .paper-block {
            background: var(--paper-cream);
            padding: 60px 50px 40px;
            border-radius: 2px;
            box-shadow: var(--3d-shadow);
            border: 1px solid #eee;
            position: relative;
            transform: rotate(-0.5deg);
        }

        /* Binder Clip/Tape Effect */
        .paper-block::before {
            content: "";
            position: absolute;
            top: -15px; left: 50%;
            transform: translateX(-50%);
            width: 120px; height: 35px;
            background: rgba(255, 209, 220, 0.4); /* Washi tape */
            border: 1px dashed var(--muted-red);
        }

        /* Sidebar info as "Attached Memo" */
        .sidebar-memo {
            position: absolute;
            top: -40px;
            right: -100px;
            width: 220px;
            background: #fff9c4; /* Yellow sticky note */
            padding: 20px;
            box-shadow: 3px 5px 10px rgba(0,0,0,0.1);
            transform: rotate(4deg);
            z-index: 20;
        }

        /* Calendar Note */
        .calendar-scrap {
            position: absolute;
            bottom: -30px;
            left: -120px;
            width: 190px;
            background: white;
            padding: 15px;
            border: 2px solid var(--pastel-pink);
            box-shadow: var(--3d-shadow);
            transform: rotate(-3deg);
            text-align: center;
        }

        /* --- FORM ELEMENTS --- */
        .paper-block h1 {
            font-family: 'Georgia', serif;
            color: var(--muted-red);
            font-style: italic;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-field { margin-bottom: 25px; }
        .form-field label { 
            display: block; 
            font-size: 0.8rem; 
            color: var(--muted-red); 
            font-weight: bold;
            margin-bottom: 8px;
        }

        .form-field input, .form-field textarea {
            width: 100%;
            border: none;
            border-bottom: 1.5px solid var(--pastel-pink);
            background: transparent;
            padding: 10px 5px;
            font-family: inherit;
            outline: none;
        }

        .form-field textarea {
            height: 120px;
            background-image: linear-gradient(#f0f0f0 1px, transparent 1px);
            background-size: 100% 2em;
            line-height: 2em;
        }

        .send-button {
            display: block;
            margin: 20px auto 0;
            background: var(--muted-red);
            color: white;
            border: none;
            padding: 12px 45px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #c27a7c;
        }

        /* --- DECORATIVE STAMP --- */
        .stamp {
            position: absolute;
            top: 30px; right: 30px;
            width: 60px; height: 60px;
            border: 2px dashed var(--muted-red);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            color: var(--muted-red);
            transform: rotate(15deg);
        }

        /* Responsive adjustments */
        @media (max-width: 1100px) {
            .sidebar-memo, .calendar-scrap { 
                position: static; 
                margin: 20px auto; 
                transform: none; 
            }
            body { padding: 140px 60px; }
        }
    </style>
</head>
<body>

    <div class="lace-edge lace-top"></div>
    <div class="lace-edge lace-bottom"></div>
    <div class="lace-edge lace-left"></div>
    <div class="lace-edge lace-right"></div>

    <nav>
        <a href="home.html">home</a>
        <a href="aboutme.html">about</a>
        <a href="blog.html">blog</a>
        <a href="contact.html" style="color: var(--pastel-pink)">contact</a>
        <a href="feedback.html">feedback</a>
        <a href="index.html">index</a>
    </nav>

    <div class="workspace">
        <div class="sidebar-memo">
            <p style="font-size: 0.9rem; font-weight: bold;">📫 Where to find me:</p>
            <p style="font-size: 0.85rem; margin-top: 10px; line-height: 1.6;">
                123 Pastel Lane<br>
                Cherry Blossom Town<br>
                Zip: 00426
            </p>
            <div style="margin-top: 15px; font-size: 1.2rem;">💌</div>
        </div>

        <div class="paper-block">
            <div class="stamp">AIR MAIL</div>
            <h1>Write a Letter...</h1>
            <form>
                <div class="form-field">
                    <label>YOUR NAME</label>
                    <input type="text" placeholder="Tell me who you are...">
                </div>
                <div class="form-field">
                    <label>YOUR EMAIL</label>
                    <input type="email" placeholder="Where should I reply?">
                </div>
                <div class="form-field">
                    <label>THE MESSAGE</label>
                    <textarea placeholder="Write your thoughts here..."></textarea>
                </div>
                <button type="submit" class="send-button">Send 🍒</button>
            </form>
        </div>

        <div class="calendar-scrap">
            <div id="month-year" style="font-weight: bold; color: var(--muted-red); margin-bottom: 8px;"></div>
            <div id="calendar-days" style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; font-size: 0.7rem;"></div>
        </div>
    </div>

    <script>
        function updateCalendar() {
            const now = new Date();
            const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            
            document.getElementById('month-year').innerText = `🌸 ${months[now.getMonth()]} ${now.getFullYear()}`;
            
            const daysContainer = document.getElementById('calendar-days');
            const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
            const totalDays = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();

            daysContainer.innerHTML = '';
            ['S','M','T','W','T','F','S'].forEach(d => {
                const h = document.createElement('b');
                h.innerText = d;
                daysContainer.appendChild(h);
            });

            for (let i = 0; i < firstDay; i++) daysContainer.appendChild(document.createElement('span'));

            for (let d = 1; d <= totalDays; d++) {
                const s = document.createElement('span');
                s.innerText = d;
                if (d === now.getDate()) {
                    s.style.backgroundColor = '#FFD1DC';
                    s.style.color = 'white';
                    s.style.borderRadius = '50%';
                }
                daysContainer.appendChild(s);
            }
        }
        updateCalendar();
    </script>
</body>
</html>
