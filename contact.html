<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | High-Fashion Scrapbook</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-pattern: url('download (3).jpg'); 
            --paper-cream: #FFFDF5;
            --pastel-pink: #FFD1DC;
            --muted-red: #E5989B;
            --deep-ink: #2c2c2c;
            --3d-shadow: 6px 10px 20px rgba(0,0,0,0.08);
        }

        body {
            background-image: var(--bg-pattern);
            background-size: 250px;
            background-repeat: repeat;
            font-family: 'Times New Roman', Times, serif; /* Classy Serif */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: flex-start; /* Align content to the left */
            padding: 80px 5% 100px;
            position: relative;
            overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        nav {
            position: fixed;
            top: 30px;
            right: 50px; /* Moved to the right for balance */
            display: flex;
            gap: 20px;
            z-index: 1100;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(5px);
            padding: 10px 30px;
            border-radius: 50px;
            border: 1px solid var(--pastel-pink);
            box-shadow: var(--3d-shadow);
        }
        nav a { 
            text-decoration: none; 
            color: var(--deep-ink); 
            font-weight: 600; 
            font-size: 0.9rem; 
            text-transform: lowercase;
            font-family: 'Segoe UI', sans-serif;
        }

        /* --- CLASSY OVERSIZED TYPOGRAPHY --- */
        .contact-title {
            position: relative;
            font-size: clamp(8rem, 18vw, 15rem); /* Responsive huge size */
            line-height: 0.75;
            color: var(--deep-ink);
            text-transform: lowercase;
            margin-top: 50px;
            margin-bottom: 40px;
            z-index: 5;
            letter-spacing: -5px;
            font-weight: 400;
            max-width: 50%; /* Covers half the screen */
        }
        
        .contact-title span { 
            display: block; 
            border-bottom: 4px solid var(--deep-ink); 
            width: fit-content; 
        }
        
        .contact-title .con { margin-left: -10px; color: var(--muted-red); }
        .contact-title .ta { margin-left: 40px; }
        .contact-title .ct { margin-left: 80px; }

        /* --- ENVELOPE STAMPS (LEFT SIDE) --- */
        .scraps-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-left: 20px;
            z-index: 10;
        }

        .envelope {
            width: 320px;
            background: var(--paper-cream);
            padding: 30px;
            border-left: 15px solid var(--pastel-pink); /* Vertical accent */
            box-shadow: var(--3d-shadow);
            position: relative;
        }
        .envelope:nth-child(1) { transform: rotate(-2deg); }
        .envelope:nth-child(2) { transform: rotate(1.5deg); margin-left: 15px; }

        .envelope h3 {
            font-family: 'Segoe UI', sans-serif;
            color: var(--muted-red);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .envelope p { 
            font-size: 1.4rem; 
            color: var(--deep-ink); 
            font-style: italic;
        }

        /* --- STICKER PLACEHOLDERS --- */
        .sticker {
            position: absolute;
            background-size: contain;
            background-repeat: no-repeat;
            z-index: 8;
            filter: drop-shadow(2px 2px 5px rgba(0,0,0,0.1));
            transition: transform 0.3s ease;
        }
        .sticker:hover { transform: scale(1.1) rotate(0deg); }

        .sticker-1 { 
            top: 20%; right: 15%; width: 150px; height: 150px; 
            background-image: url('[URL_FOR_STICKER_1]'); 
            transform: rotate(12deg);
            border: 1px dashed #ccc; /* Visual placeholder */
        }
        .sticker-2 { 
            bottom: 10%; right: 5%; width: 120px; height: 120px; 
            background-image: url('[URL_FOR_STICKER_2]'); 
            transform: rotate(-15deg);
            border: 1px dashed #ccc;
        }
        .sticker-3 { 
            top: 45%; left: 40%; width: 80px; height: 80px; 
            background-image: url('[URL_FOR_STICKER_3]'); 
            transform: rotate(-5deg);
            border: 1px dashed #ccc;
        }

        /* --- CALENDAR --- */
        .calendar-scrap {
            position: absolute;
            top: 150px;
            right: 5%;
            background: white;
            padding: 20px;
            box-shadow: var(--3d-shadow);
            transform: rotate(3deg);
            z-index: 2;
            width: 180px;
            border-radius: 5px;
        }

        @media (max-width: 900px) {
            .contact-title { font-size: 6rem; max-width: 100%; }
            nav { right: 20px; top: 10px; }
            .calendar-scrap { display: none; }
        }

    </style>
</head>
<body>

    <nav>
        <a href="home.html">home</a>
        <a href="about.html">about</a>
        <a href="blog.html">blog</a>
        <a href="contact.html">contact</a>
        <a href="index.html">index</a>
    </nav>

    <div class="sticker sticker-1"></div> <div class="sticker sticker-2"></div> <div class="sticker sticker-3"></div> <div class="contact-title">
        <span class="con">con</span>
        <span class="ta">ta</span>
        <span class="ct">ct</span>
    </div>

    <div class="scraps-container">
        <div class="envelope">
            <h3>Instagram</h3>
            <p>@studio.diary</p>
        </div>

        <div class="envelope">
            <h3>Email</h3>
            <p>hello@scrapbook.co</p>
        </div>
    </div>

    <div class="calendar-scrap">
        <div id="month-year" style="font-weight: bold; color: var(--muted-red); font-family: 'Segoe UI', sans-serif;"></div>
        <div id="calendar-days" style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; font-size: 0.7rem; margin-top: 15px; font-family: sans-serif;"></div>
    </div>

    <script>
        function generateCalendar() {
            const now = new Date();
            const monthArr = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            document.getElementById('month-year').innerText = `${monthArr[now.getMonth()]} ${now.getFullYear()}`;
            
            const calendarDays = document.getElementById('calendar-days');
            const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
            const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();

            calendarDays.innerHTML = '';
            ['S','M','T','W','T','F','S'].forEach(h => {
                const el = document.createElement('span');
                el.style.fontWeight = 'bold'; el.innerText = h;
                calendarDays.appendChild(el);
            });

            for (let i = 0; i < firstDay; i++) calendarDays.appendChild(document.createElement('span'));
            for (let day = 1; day <= daysInMonth; day++) {
                const span = document.createElement('span');
                span.innerText = day;
                if (day === now.getDate()) {
                    span.style.color = '#E5989B';
                    span.style.fontWeight = 'bold';
                    span.style.borderBottom = '2px solid #FFD1DC';
                }
                calendarDays.appendChild(span);
            }
        }
        generateCalendar();
    </script>
</body>
</html>
