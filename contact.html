<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Scrapbook Edition</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-pattern: url('download (3).jpg'); 
            --paper-cream: #FFFDF5;
            --pastel-pink: #FFD1DC;
            --muted-red: #E5989B;
            --3d-shadow: 4px 6px 12px rgba(0,0,0,0.1);
        }

        body {
            background-image: var(--bg-pattern);
            background-size: 250px;
            background-repeat: repeat;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Adjusted padding now that lace is removed */
            padding: 100px 40px; 
            position: relative;
            overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        nav {
            position: fixed;
            top: 30px;
            display: flex;
            gap: 15px;
            z-index: 1100;
            background: white;
            padding: 8px 25px;
            border-radius: 50px;
            border: 1.5px solid var(--pastel-pink);
            box-shadow: var(--3d-shadow);
        }
        nav a { text-decoration: none; color: var(--muted-red); font-weight: 600; font-size: 0.85rem; }

        /* --- BOLD "NOVEMBER-STYLE" TYPOGRAPHY --- */
        .contact-title {
            position: relative;
            font-family: 'Arial Black', sans-serif;
            font-size: 8rem;
            line-height: 0.8;
            color: #222;
            text-transform: lowercase;
            margin-bottom: 40px;
            margin-top: 40px;
            z-index: 5;
            text-align: left;
            width: 300px; 
            pointer-events: none;
        }
        .contact-title span { display: block; border-bottom: 3px solid #222; width: fit-content; }
        .contact-title .con { margin-left: 0; }
        .contact-title .ta { margin-left: 25px; }
        .contact-title .ct { margin-left: 50px; }

        /* --- ENVELOPE SCRAPS --- */
        .scraps-container {
            display: flex;
            gap: 40px;
            margin-top: 20px;
            z-index: 10;
        }

        .envelope {
            width: 280px;
            background: var(--paper-cream);
            padding: 25px;
            border: 2px solid var(--pastel-pink);
            box-shadow: var(--3d-shadow);
            position: relative;
            transition: 0.3s;
        }
        .envelope:nth-child(1) { transform: rotate(-4deg); }
        .envelope:nth-child(2) { transform: rotate(2deg); margin-top: 25px; }

        /* Envelope Flap Detail */
        .envelope::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 10px;
            background: var(--pastel-pink);
            opacity: 0.3;
        }

        .envelope h3 {
            color: var(--muted-red);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            border-bottom: 1px dashed var(--pastel-pink);
            padding-bottom: 5px;
        }

        .envelope p { 
            font-size: 1.1rem; 
            color: #444; 
            font-family: 'Courier New', Courier, monospace;
            word-wrap: break-word;
        }

        /* --- CALENDAR SCRAP --- */
        .calendar-scrap {
            position: absolute;
            top: 180px;
            right: 10%;
            background: white;
            padding: 15px;
            border: 1px solid #ddd;
            box-shadow: var(--3d-shadow);
            transform: rotate(6deg);
            z-index: 2;
            width: 160px;
        }

        @media (max-width: 768px) {
            .contact-title { font-size: 5rem; width: 200px; }
            .scraps-container { flex-direction: column; align-items: center; }
            .calendar-scrap { position: static; margin-bottom: 30px; transform: none; }
        }

    </style>
</head>
<body>

    <nav>
        <a href="home.html">home</a>
        <a href="aboutme.html">about</a>
        <a href="blog.html">blog</a>
        <a href="contact.html">contact</a>
        <a href="feedback.html">feedback</a>
        <a href="index.html">index</a>
    </nav>

    <div class="contact-title">
        <span class="con">con</span>
        <span class="ta">ta</span>
        <span class="ct">ct</span>
    </div>

    <div class="calendar-scrap">
        <div id="month-year" style="font-weight: bold; color: var(--muted-red); font-size: 0.8rem; text-align: center;"></div>
        <div id="calendar-days" style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; font-size: 0.6rem; margin-top: 10px; text-align: center;"></div>
    </div>

    <div class="scraps-container">
        <div class="envelope">
            <h3>Socials</h3>
            <p>@your_handle</p>
            <p style="font-size: 0.75rem; margin-top: 15px; color: #999;">find me on instagram 🍒</p>
        </div>

        <div class="envelope">
            <h3>Email</h3>
            <p>hello@site.com</p>
            <p style="font-size: 0.75rem; margin-top: 15px; color: #999;">available for chat 🌸</p>
        </div>
    </div>

    <script>
        function generateCalendar() {
            const now = new Date();
            const monthArr = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            document.getElementById('month-year').innerText = `${monthArr[now.getMonth()]} ${now.getFullYear()}`;
            
            const calendarDays = document.getElementById('calendar-days');
            const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
            const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();

            calendarDays.innerHTML = '';
            ['S','M','T','W','T','F','S'].forEach(h => {
                const el = document.createElement('span');
                el.style.fontWeight = 'bold'; el.innerText = h;
                calendarDays.appendChild(el);
            });

            for (let i = 0; i < firstDay; i++) calendarDays.appendChild(document.createElement('span'));
            for (let day = 1; day <= daysInMonth; day++) {
                const span = document.createElement('span');
                span.innerText = day;
                if (day === now.getDate()) {
                    span.style.color = '#E5989B';
                    span.style.fontWeight = 'bold';
                    span.style.border = '1px solid #FFD1DC';
                }
                calendarDays.appendChild(span);
            }
        }
        generateCalendar();
    </script>
</body>
</html>
