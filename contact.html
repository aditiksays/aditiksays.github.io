<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Midnight UI</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        nav {
            margin-top: 30px;
            background: rgba(30, 41, 59, 0.5);
            padding: 15px 30px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        nav a {
            color: var(--text-dim);
            text-decoration: none;
            margin: 0 15px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        nav a:hover { color: var(--accent); }
        .active { color: var(--accent); text-shadow: 0 0 8px var(--accent); }

        .container {
            width: 90%;
            max-width: 600px;
            margin-top: 80px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 40px;
        }

        /* Contact Method Cards */
        .contact-method {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
        }

        .contact-method:hover {
            transform: scale(1.02);
            border-color: var(--accent);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .contact-info {
            text-align: left;
        }

        .label {
            display: block;
            color: var(--accent);
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .value {
            font-size: 1.2rem;
            font-weight: 500;
        }

        .arrow {
            font-size: 1.5rem;
            color: var(--text-dim);
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="blog.html">Blog</a>
        <a href="about.html">About</a>
        <a href="contact.html" class="active">Contact</a>
        <a href="feedback.html">Feedback</a>
    </nav>

    <div class="container">
        <h1>Let's Connect.</h1>

        <a href="mailto:yourname@email.com" class="contact-method">
            <div class="contact-info">
                <span class="label">Email</span>
                <span class="value">yourname@email.com</span>
            </div>
            <span class="arrow">→</span>
        </a>

        <a href="https://linkedin.com/in/yourprofile" target="_blank" class="contact-method">
            <div class="contact-info">
                <span class="label">LinkedIn</span>
                <span class="value">Professional Profile</span>
            </div>
            <span class="arrow">→</span>
        </a>

        <a href="https://github.com/yourusername" target="_blank" class="contact-method">
            <div class="contact-info">
                <span class="label">GitHub</span>
                <span class="value">Code Repositories</span>
            </div>
            <span class="arrow">→</span>
        </a>
    </div>

</body>
</html>
