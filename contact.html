<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Scrapbook Edition</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --paper-cream: #FDF4E3; /* Beige base */
            --pastel-pink: #FFD1DC;
            --muted-red: #E5989B;
            --charcoal: #222;
            --3d-shadow: 4px 6px 12px rgba(0,0,0,0.1);
        }

        body {
            background-color: var(--paper-cream);
            /* Dotted pattern */
            background-image: radial-gradient(#dcdcdc 1.5px, transparent 1.5px);
            background-size: 20px 20px;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 100px 40px; 
            position: relative;
            overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        nav {
            position: fixed;
            top: 30px;
            display: flex;
            gap: 15px;
            z-index: 1100;
            background: white;
            padding: 8px 25px;
            border-radius: 50px;
            border: 1.5px solid var(--pastel-pink);
            box-shadow: var(--3d-shadow);
        }
        nav a { text-decoration: none; color: var(--muted-red); font-weight: 600; font-size: 0.85rem; }

        /* --- CLASSY, BOLD, CAPITAL "CONTACT" --- */
        .contact-title {
    font-family: 'Georgia', serif;
    /* Use vw so it scales with the screen width and stays on one line */
    font-size: 12vw; 
    font-weight: 700;
    color: var(--charcoal);
    text-transform: uppercase;
    /* Reduced spacing to keep it within the horizontal bounds */
    letter-spacing: 5px; 
    /* Tightened line-height to stop it from pushing content down */
    line-height: 0.9; 
    margin-top: 40px;
    margin-bottom: 10px;
    z-index: 5;
    text-align: left;
    width: 100%;
    pointer-events: none;
    opacity: 0.95;
    /* Refined shadow for a cleaner look at this scale */
    text-shadow: 2px 2px 0 #fff, 4px 4px 0 var(--pastel-pink);
}
        /* --- ENVELOPE SCRAPS (RIGHTEST SIDE) --- */
        .scraps-container {
            position: absolute;
            top: 250px; /* Aligned vertically with the title space */
            right: 50px; /* RIGHTEST SIDE */
            display: flex;
            flex-direction: column;
            gap: 40px;
            z-index: 10;
        }

        .envelope {
            width: 320px; /* Slightly wider */
            background: white;
            padding: 30px;
            border: 2px solid var(--pastel-pink);
            box-shadow: var(--3d-shadow);
            position: relative;
            transition: 0.3s;
        }
        .envelope:nth-child(1) { transform: rotate(-3deg); }
        .envelope:nth-child(2) { transform: rotate(4deg); }

        /* Envelope Flap Detail */
        .envelope::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 12px;
            background: var(--pastel-pink);
            opacity: 0.3;
        }

        .envelope h3 {
            color: var(--muted-red);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            border-bottom: 1px dashed var(--pastel-pink);
            padding-bottom: 8px;
        }

        .envelope p { 
            font-size: 1.3rem; 
            color: #444; 
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            word-wrap: break-word;
        }

        /* --- CALENDAR SCRAP --- */
        .calendar-scrap {
            position: absolute;
            top: 90px;
            bottom: 0px;
            left: 30%; /* Kept separate for balance */
            background: white;
            padding: 15px;
            border: 1px solid #ddd;
            box-shadow: var(--3d-shadow);
            transform: rotate(-5deg);
            z-index: 2;
            width: 50px;
        }

        /* --- STICKER PLACEHOLDERS (ALL OVER) --- */
        .sticker-placeholder {
            position: absolute;
            width: 100px;
            height: 100px;
            background: white;
            border: 2px dashed #999;
            box-shadow: var(--3d-shadow);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            color: #777;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
            z-index: 4; /* Behind main title/scraps, above background */
            transition: 0.3s;
        }

        /* --- STICKER PLACEHOLDERS (REPOSITIONED RIGHT & MIDDLE) --- */
.s1 { 
    top: 30%; 
    left: 65%; 
    transform: rotate(10deg); 
    width: 120px; 
    height: 120px;
}

.s2 { 
    top: 45%; 
    left: 75%; 
    transform: rotate(-8deg); 
    width: 90px; 
    height: 90px;
}

.s3 { 
    top: 60%; 
    left: 60%; 
    transform: rotate(12deg); 
    width: 110px; 
    height: 110px;
}

.s4 { 
    top: 55%; 
    left: 80%; 
    transform: rotate(-15deg); 
    width: 80px; 
    height: 80px;
}
        @media (max-width: 1200px) {
            .contact-title { font-size: 10rem; letter-spacing: 10px; }
            .scraps-container { position: static; flex-direction: row; justify-content: center; margin-top: 40px; right: auto; }
            .calendar-scrap { position: static; margin: 30px auto; transform: none; width: 100%; }
            .sticker-placeholder { position: static; display: inline-flex; margin: 10px; transform: none; }
        }

        @media (max-width: 768px) {
            .contact-title { font-size: 6rem; letter-spacing: 5px; }
            .envelope { width: 100%; max-width: 300px; }
        }

    </style>
</head>
<body>

    <nav>
        <a href="home.html">home</a>
        <a href="aboutme.html">about</a>
        <a href="blog.html">blog</a>
        <a href="contact.html">contact</a>
        <a href="index.html">index</a>
    </nav>

    <div class="sticker-placeholder s1">PHOTO [URL_FOR_ASSET]</div>
    <div class="sticker-placeholder s2">🍒 [URL_FOR_ASSET]</div>
    <div class="sticker-placeholder s3">MEMENTO [URL_FOR_ASSET]</div>
    <div class="sticker-placeholder s4">🌸 [URL_FOR_ASSET]</div>

    <div class="contact-title"><u>
        CON
        <br>TA
        <br>CT
        </u>
    </div>

    <div class="calendar-scrap">
        <div id="month-year" style="font-weight: bold; color: var(--muted-red); font-size: 0.9rem; text-align: center;"></div>
        <div id="calendar-days" style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; font-size: 0.7rem; margin-top: 10px; text-align: center;"></div>
    </div>

    <div class="scraps-container">
        <div class="envelope">
            <h3>Social Channels</h3>
            <p>@aditiii_kk</p>
            <p style="font-size: 0.8rem; margin-top: 15px; color: #888;">DM me on instagram! 🍒</p>
        </div>

        <div class="envelope">
            <h3>Direct Mailbox</h3>
            <p>aditiksays.gmail.com</p>
            <p style="font-size: 0.8rem; margin-top: 15px; color: #888;"> Response within 24 hours 🌸</p>
        </div>
    </div>

    <script>
        function generateCalendar() {
            const now = new Date();
            const monthArr = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            document.getElementById('month-year').innerText = `${monthArr[now.getMonth()]} ${now.getFullYear()}`;
            
            const calendarDays = document.getElementById('calendar-days');
            const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
            const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();

            calendarDays.innerHTML = '';
            ['S','M','T','W','T','F','S'].forEach(h => {
                const el = document.createElement('span');
                el.style.fontWeight = 'bold'; el.innerText = h;
                calendarDays.appendChild(el);
            });

            for (let i = 0; i < firstDay; i++) calendarDays.appendChild(document.createElement('span'));
            for (let day = 1; day <= daysInMonth; day++) {
                const span = document.createElement('span');
                span.innerText = day;
                if (day === now.getDate()) {
                    span.style.color = '#E5989B';
                    span.style.fontWeight = 'bold';
                    span.style.border = '1px solid #FFD1DC';
                }
                calendarDays.appendChild(span);
            }
        }
        generateCalendar();
    </script>
</body>
</html>
