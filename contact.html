<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Scrapbook Edition</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --paper: #FDF4E3; --pink: #FFD1DC; --red: #E5989B;
            --dark: #333; --shadow: 4px 6px 12px rgba(0,0,0,0.15);
        }

        body {
            background: var(--paper) radial-gradient(#dcdcdc 1.5px, transparent 1.5px) repeat 20px 20px;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh; display: flex; position: relative;
            overflow-x: hidden; padding: 40px;
        }

        /* --- NAVIGATION --- */
        nav {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: white; padding: 8px 25px; border-radius: 50px;
            border: 1.5px solid var(--pink); box-shadow: var(--shadow); z-index: 1100;
        }
        nav a { text-decoration: none; color: var(--red); font-weight: 600; font-size: 0.85rem; margin: 0 7px; }

        /* --- CONTACT TITLE (VERTICAL STACK) --- */
        .contact-title {
            display: flex; flex-direction: column; gap: 10px;
            margin-top: 60px; z-index: 10; width: min-content;
        }
        .note {
            font-size: 5vw; font-weight: 900; padding: 10px 25px;
            box-shadow: 3px 3px 8px rgba(0,0,0,0.15); border-radius: 2px;
        }
        .n1, .n6 { background: var(--dark); color: var(--paper); transform: rotate(-3deg); }
        .n2 { background: var(--red); color: #fff; transform: rotate(4deg); }
        .n3, .n7 { background: #fff; color: var(--red); border: 1px solid #ddd; transform: rotate(-2deg); }
        .n4 { background: #6D6875; color: #fff; transform: rotate(5deg); }
        .n5 { background: #B5838D; color: #fff; transform: rotate(-4deg); }

        /* --- STICKERS (FIXED SIZE & COLLAPSED) --- */
        .s { position: absolute; width: 125px; height: 125px; z-index: 2; }
        .s img { width: 100%; height: 100%; object-fit: contain; }
        
        .s1 { top: 10%; left: 25%; transform: rotate(12deg); }
        .s2 { top: 40%; left: 40%; transform: rotate(-8deg); }
        .s3 { bottom: 20%; left: 10%; transform: rotate(5deg); }
        .s4 { top: 60%; left: 15%; transform: rotate(-15deg); }
        .s5 { top: 25%; right: 25%; transform: rotate(-5deg); }
        .s6 { bottom: 35%; right: 40%; transform: rotate(10deg); }

        /* --- ENVELOPES & SCRAPS --- */
        .scraps-container { position: absolute; top: 120px; right: 50px; display: flex; flex-direction: column; gap: 20px; z-index: 15; }
        .envelope { width: 320px; background: #fff; padding: 25px; border: 1px solid #ddd; box-shadow: var(--shadow); transition: 0.3s; }
        .envelope:hover { transform: scale(1.02); }
        .envelope h3 { color: var(--red); font-size: 0.8rem; text-transform: uppercase; border-bottom: 1px dashed var(--pink); margin: 10px 0 15px; }
        .envelope p { font-family: 'Courier New', monospace; font-weight: bold; }

        .calendar-scrap { background: white; padding: 15px; border: 1px solid #ddd; box-shadow: var(--shadow); width: 190px; align-self: center; transform: rotate(-3deg); }

        @media (max-width: 1024px) {
            body { flex-direction: column; align-items: center; padding-top: 100px; }
            .scraps-container, .s { position: static; margin: 20px auto; }
            .contact-title { font-size: 10vw; align-items: center; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="home.html">home</a><a href="aboutme.html">about</a>
        <a href="blog.html">blog</a><a href="contact.html">contact</a>
        <a href="index.html">cover</a>
    </nav>

    <div class="s s2"><img src="love.png"></div>
    <div class="s s1"><img src="camera.png"></div>
    <div class="s s3"><img src="questionmark.png"></div>
    <div class="s s5"><img src="catyawning.png"></div>
    <div class="s s4"><img src="pinktelephone.png"></div>
    <div class="s s6"><img src="lilydrawing.png"></div>

    <div class="contact-title">
        <span class="note n1">C</span><span class="note n2">O</span><span class="note n3">N</span>
        <span class="note n4">T</span><span class="note n5">A</span><span class="note n6">C</span><span class="note n7">T</span>
    </div>

    <div class="scraps-container">
        <div class="envelope">
            <h3>Social Channels</h3>
            <p>@aditiii_kk</p>
        </div>
        <div class="envelope">
            <h3>Direct Mailbox</h3>
            <p>aditiksays@gmail.com</p>
        </div>
        <div class="calendar-scrap">
            <div id="month-year" style="font-weight: bold; color: var(--red); text-align: center;"></div>
            <div id="calendar-days" style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; font-size: 0.7rem; margin-top: 10px; text-align: center;"></div>
        </div>
    </div>

    <script>
        function generateCalendar() {
            const now = new Date();
            const monthArr = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            document.getElementById('month-year').innerText = `${monthArr[now.getMonth()]} ${now.getFullYear()}`;
            const calendarDays = document.getElementById('calendar-days');
            const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
            const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();

            ['S','M','T','W','T','F','S'].forEach(h => {
                const el = document.createElement('span'); el.style.fontWeight='bold'; el.innerText=h; calendarDays.appendChild(el);
            });
            for (let i = 0; i < firstDay; i++) calendarDays.appendChild(document.createElement('span'));
            for (let day = 1; day <= daysInMonth; day++) {
                const span = document.createElement('span'); span.innerText = day;
                if (day === now.getDate()) { span.style.color = '#E5989B'; span.style.fontWeight = 'bold'; }
                calendarDays.appendChild(span);
            }
        }
        generateCalendar();
    </script>
</body>
</html>
