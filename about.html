<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback | Sticker Book</title>
    <style>
        :root {
            --bg-color: #fffdf5;      /* Warm Vanilla */
            --card-bg: #ffffff;       /* Paper White */
            --accent: #ffb7c5;        /* Strawberry Pink */
            --text-main: #5d4d50;     /* Cocoa Brown */
            --text-dim: #a09395;      /* Muted Rose */
        }

        body {
            background-color: var(--bg-color);
            /* Polka dot grid background */
            background-image: radial-gradient(#f0eadd 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            color: var(--text-main);
            font-family: 'Segoe UI', cursive, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Navigation styled like a sticker */
        nav {
            margin-top: 30px;
            background: white;
            padding: 12px 25px;
            border-radius: 25px;
            border: 3px solid var(--accent);
            box-shadow: 5px 5px 0px var(--accent);
        }

        nav a {
            color: var(--text-dim);
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
            text-transform: lowercase;
            transition: 0.3s;
        }

        nav a:hover, .active { color: #ff6b81 !important; }

        .container {
            width: 90%;
            max-width: 500px;
            margin: 60px 0;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 35px;
            border: 4px solid #fff; /* White border for sticker look */
            box-shadow: 10px 10px 0px #f0d5e2; /* Soft thick shadow */
            position: relative; /* Essential for placing stickers inside */
        }

        h1 { 
            color: #ff85a1; 
            font-size: 2.2rem; 
            text-shadow: 2px 2px 0px white;
            margin-bottom: 5px; 
        }

        .subtitle { color: var(--text-dim); margin-bottom: 30px; font-weight: 500; }

        /* Form Elements */
        .input-group { margin-bottom: 25px; position: relative; z-index: 2; }

        label {
            display: block;
            font-size: 0.8rem;
            text-transform: lowercase;
            font-weight: bold;
            margin-bottom: 8px;
            color: #ff85a1;
        }

        input, textarea, select {
            width: 100%;
            padding: 14px;
            background: #fffdfb;
            border: 2px solid #f0eadd;
            border-radius: 15px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 1rem;
            box-sizing: border-box;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            background: white;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 18px;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 5px 0px #f89ba9;
            transition: all 0.2s;
        }

        .submit-btn:hover {
            transform: translateY(3px);
            box-shadow: 0 2px 0px #f89ba9;
        }

        /* STICKER CLASS */
        .sticker {
            position: absolute;
            z-index: 5;
            filter: drop-shadow(3px 3px 0px rgba(0,0,0,0.05));
            pointer-events: none; /* Allows clicking through the sticker to the form */
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">home</a>
        <a href="blog.html">blog</a>
        <a href="about.html">about</a>
        <a href="contact.html">contact</a>
        <a href="feedback.html" class="active">feedback</a>
    </nav>

    <div class="container">
        <img src="heart-sticker.png" class="sticker" style="width: 80px; top: -30px; right: -20px; transform: rotate(15deg);" alt="">
        
        <h1>Send Feedback</h1>
        <p class="subtitle">leave a sweet note! 🎀</p>

        <form action="https://formspree.io/f/your-id" method="POST">
            <div class="input-group">
                <label>how was your visit?</label>
                <select name="rating">
                    <option value="excellent">Amazing ✨</option>
                    <option value="good">Good 👍</option>
                    <option value="neutral">Okay 😐</option>
                    <option value="bad">Needs Work 🛠️</option>
                </select>
            </div>

            <div class="input-group">
                <label>your thoughts</label>
                <textarea name="message" required placeholder="type here..."></textarea>
            </div>

            <button type="submit" class="submit-btn">SEND NOTE</button>
        </form>
    </div>

</body>
</html>
