<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digi Journal | Robust Grid</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Work+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-writing: #000000;
            --accent: #ff3e3e;
            --topbar-height: 70px;
            /* Default heights - you can override these inline in the HTML */
            --default-song-w: 240px;
            --default-song-h: 480px;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Work Sans', sans-serif;
            background-color: #ffffff;
            overflow: hidden; /* Locks body to enable independent panel scrolling */
        }

        /* Top Navigation */
        .header-nav {
            position: fixed; top: 0; width: 100%; height: var(--topbar-height);
            background: white; display: flex; justify-content: center; align-items: center;
            z-index: 1000; border-bottom: 1px solid #efefef;
        }

        .header-nav input {
            width: 300px; padding: 8px 15px; border-radius: 8px;
            border: 1px solid #dbdbdb; background: #fafafa; outline: none;
        }

        /* Main 60:40 Container */
        .main-container {
            display: flex;
            height: calc(100vh - var(--topbar-height));
            margin-top: var(--topbar-height);
        }

        /* --- LEFT PANEL: SELF-ADJUSTING PHOTO DUMP (60%) --- */
        .left-panel {
            width: 60%; height: 100%;
            overflow-y: auto; scrollbar-width: none;
            background-image: url('[GLOBAL_LEFT_BG_IMAGE]');
            background-size: cover; background-attachment: local;
        }
        .left-panel::-webkit-scrollbar { display: none; }

        .grid-overlay {
            padding: 40px 20px; box-sizing: border-box;
            min-height: 100%;
        }

        /* CSS Columns: This ensures images stack and flow without breaking rows */
        .masonry-grid {
            column-count: 3;
            column-gap: 8px;
            width: 100%;
        }

        .photo-item {
            display: inline-block; /* Essential for masonry flow */
            width: 100%;
            margin-bottom: 8px;
            background: #f9f9f9;
        }

        .photo-item img {
            width: 100%; 
            display: block;
            border-radius: 0; /* Sharp edges for posts */
            /* Height is determined by the specific image or inline style */
        }

        /* --- RIGHT PANEL: SONGS & WRITING (40%) --- */
        .right-panel {
            width: 40%; height: 100%;
            overflow-y: auto; scrollbar-width: none;
            padding: 40px; box-sizing: border-box;
            background-color: #fafafa; border-left: 1px solid #efefef;
        }
        .right-panel::-webkit-scrollbar { display: none; }

        .mixtape-section { position: relative; margin-bottom: 60px; }

        .song-grill {
            display: flex; overflow-x: auto; gap: 20px;
            padding: 30px 10px; scrollbar-width: none; scroll-behavior: smooth;
        }
        .song-grill::-webkit-scrollbar { display: none; }

        .song-card {
            position: relative; 
            min-width: var(--default-song-w); 
            height: var(--default-song-h);
            flex-shrink: 0; transition: transform 0.4s;
            text-decoration: none;
        }

        .card-blur-bg {
            position: absolute; top: 15px; left: 0; width: 100%; height: 100%;
            background-size: cover; filter: blur(25px) opacity(0.35); z-index: 1;
        }

        .card-main {
            position: relative; width: 100%; height: 100%;
            background: #fff; border-radius: 20px;
            overflow: hidden; z-index: 2; box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        .card-main img { width: 100%; height: 100%; object-fit: cover; }
        .song-card:hover { transform: translateY(-10px); }

        /* Writing Box */
        .content-box {
            background-color: var(--bg-writing); color: #fff;
            padding: 60px 40px; font-family: 'Playfair Display', serif;
        }
        .content-box p { font-size: 1.3rem; line-height: 1.8; opacity: 0.9; margin-bottom: 30px; }
        .content-box p::first-letter {
            float: left; font-size: 6rem; line-height: 0.7;
            padding-right: 15px; color: var(--accent); font-weight: bold;
        }

        /* Nav Arrows */
        .nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: white; border: 1px solid #ddd; width: 35px; height: 35px;
            border-radius: 50%; cursor: pointer; z-index: 10;
        }
        .b-l { left: -15px; } .b-r { right: -15px; }

        @media (max-width: 1000px) {
            .main-container { flex-direction: column; overflow-y: auto; }
            .left-panel, .right-panel { width: 100%; height: auto; overflow: visible; }
            .masonry-grid { column-count: 2; }
        }
    </style>
</head>
<body>

    <script>
        const grill = document.getElementById('songGrill');
        function mv(v) { grill.scrollBy({ left: v, behavior: 'smooth' }); }
        grill.addEventListener('wheel', (e) => {
            if (e.deltaY !== 0) { e.preventDefault(); grill.scrollLeft += e.deltaY; }
        });
    </script>
