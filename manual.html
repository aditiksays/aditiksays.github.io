<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digi Journal | Restored Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Work+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-writing: #000000;
            --accent: #ff3e3e;
            --topbar-height: 70px;
            --song-w: 240px;
            --song-h: 480px;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Work Sans', sans-serif;
            background-color: #ffffff;
            overflow: hidden; 
        }

        /* --- NAVIGATION & SIDEBAR --- */
        .header-nav {
            position: fixed; top: 0; width: 100%; height: var(--topbar-height);
            background: white; display: flex; justify-content: center; align-items: center;
            z-index: 900; border-bottom: 1px solid #efefef;
        }

        .header-nav input {
            width: 300px; padding: 8px 15px; border-radius: 8px;
            border: 1px solid #dbdbdb; background: #fafafa; outline: none;
        }

        .sidebar {
            position: fixed; right: -280px; top: 0; width: 280px; height: 100%;
            background: #000; transition: 0.4s cubic-bezier(0.7, 0, 0.3, 1);
            z-index: 1000; padding-top: 100px;
        }
        .sidebar.active { right: 0; }
        .sidebar a { display: block; padding: 20px 40px; color: #888; text-decoration: none; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 2px; }
        .sidebar a:hover { color: #fff; }

        .menu-btn {
            position: fixed; right: 30px; top: 20px; z-index: 1001;
            background: #000; color: #fff; border: none;
            padding: 8px 16px; border-radius: 4px; cursor: pointer;
            font-size: 0.7rem; letter-spacing: 1px;
        }

        /* --- MAIN LAYOUT --- */
        .main-container {
            display: flex; height: calc(100vh - var(--topbar-height)); margin-top: var(--topbar-height);
        }

        /* --- LEFT PANEL: MASONRY GRID (60%) --- */
        .left-panel {
            width: 60%; height: 100%; overflow-y: auto; scrollbar-width: none;
            background-image: url('[GLOBAL_LEFT_BG_IMAGE]');
            background-size: cover; background-attachment: local;
        }
        .left-panel::-webkit-scrollbar { display: none; }

        .grid-overlay { padding: 40px 20px; box-sizing: border-box; min-height: 100%; }

        .masonry-grid { column-count: 3; column-gap: 8px; width: 100%; }
        .photo-item { display: inline-block; width: 100%; margin-bottom: 8px; background: #f9f9f9; }
        .photo-item img { width: 100%; display: block; border-radius: 0; transition: 0.3s; }
        .photo-item img:hover { opacity: 0.8; }

        /* --- RIGHT PANEL: SONGS & CONTENT (40%) --- */
        .right-panel {
            width: 40%; height: 100%; overflow-y: auto; scrollbar-width: none;
            padding: 40px; box-sizing: border-box;
            background-color: #fafafa; border-left: 1px solid #efefef;
        }
        .right-panel::-webkit-scrollbar { display: none; }

        .mixtape-section { position: relative; margin-bottom: 50px; }
        .song-grill { display: flex; overflow-x: auto; gap: 20px; padding: 20px 0; scrollbar-width: none; scroll-behavior: smooth; }
        .song-grill::-webkit-scrollbar { display: none; }

        .song-card { position: relative; min-width: var(--song-w); height: var(--song-h); flex-shrink: 0; transition: 0.4s; text-decoration: none; }
        .card-blur-bg { position: absolute; top: 15px; left: 0; width: 100%; height: 100%; background-size: cover; filter: blur(25px) opacity(0.3); z-index: 1; }
        .card-main { position: relative; width: 100%; height: 100%; background: #fff; border-radius: 24px; overflow: hidden; z-index: 2; box-shadow: 0 10px 30px rgba(0,0,0,0.06); }
        .card-main img { width: 100%; height: 100%; object-fit: cover; }
        .song-card:hover { transform: translateY(-10px); }

        .content-box { background-color: var(--bg-writing); color: #fff; padding: 60px 40px; font-family: 'Playfair Display', serif; }
        .content-box p { font-size: 1.3rem; line-height: 1.8; opacity: 0.9; margin-bottom: 30px; }
        .content-box p::first-letter { float: left; font-size: 6rem; line-height: 0.7; padding-right: 15px; color: var(--accent); font-weight: bold; }

        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: white; border: 1px solid #ddd; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; z-index: 10; }
        .b-l { left: -15px; } .b-r { right: -15px; }

        @media (max-width: 1000px) {
            .main-container { flex-direction: column; overflow-y: auto; }
            .left-panel, .right-panel { width: 100%; height: auto; overflow: visible; }
            .masonry-grid { column-count: 2; }
        }
    </style>
</head>
<body>

    <button class="menu-btn" onclick="toggleMenu()">MENU</button>
    
    <nav class="sidebar" id="sidebar">
        <a href="#">Gallery</a>
        <a href="#">Mixtapes</a>
        <a href="#">Archive</a>
        <a href="#">About</a>
    </nav>

    <header class="header-nav">
        <input type="text" placeholder="Search archive...">
    </header>

    <div class="main-container">
        
        <section class="left-panel">
            <div class="grid-overlay">
                <h1 style="font-family: 'Playfair Display'; font-size: 4rem; margin-bottom: 30px;">DIGI JOURNAL</h1>
                <div class="masonry-grid">
                    <div class="photo-item"><img src="[PHOTO_1]" style="height: auto;"></div>
                    <div class="photo-item"><img src="[PHOTO_2]" style="height: auto;"></div>
                    <div class="photo-item"><img src="[PHOTO_3]" style="height: auto;"></div>
                    <div class="photo-item"><img src="[PHOTO_4]" style="height: auto;"></div>
                    <div class="photo-item"><img src="[PHOTO_5]" style="height: auto;"></div>
                    <div class="photo-item"><img src="[PHOTO_6]" style="height: auto;"></div>
                    <div class="photo-item"><img src="[PHOTO_7]" style="height: auto;"></div>
                    <div class="photo-item"><img src="[PHOTO_8]" style="height: auto;"></div>
                    <div class="photo-item"><img src="[PHOTO_9]" style="height: auto;"></div>
                    <div class="photo-item"><img src="[PHOTO_10]" style="height: auto;"></div>
                    <div class="photo-item"><img src="[PHOTO_11]" style="height: auto;"></div>
                    <div class="photo-item"><img src="[PHOTO_12]" style="height: auto;"></div>
                    <div class="photo-item"><img src="[PHOTO_13]" style="height: auto;"></div>
                    <div class="photo-item"><img src="[PHOTO_14]" style="height: auto;"></div>
                    <div class="photo-item"><img src="[PHOTO_15]" style="height: auto;"></div>
                    <div class="photo-item"><img src="[PHOTO_16]" style="height: auto;"></div>
                    <div class="photo-item"><img src="[PHOTO_17]" style="height: auto;"></div>
                    <div class="photo-item"><img src="[PHOTO_18]" style="height: auto;"></div>
                </div>
            </div>
        </section>

        <section class="right-panel">
            <div class="mixtape-section">
                <button class="nav-btn b-l" onclick="mv(-250)">&#10094;</button>
                <div class="song-grill" id="songGrill">
                    <a href="[LINK_1]" class="song-card">
                        <div class="card-blur-bg" style="background-image: url('[COVER_1]')"></div>
                        <div class="card-main"><img src="[COVER_1]"></div>
                    </a>
                    </div>
                <button class="nav-btn b-r" onclick="mv(250)">&#10095;</button>
            </div>

            <div class="content-box">
                <p>[CONTINUOUS_WRITING]</p>
            </div>
        </section>
    </div>

    <script>
        const sidebar = document.getElementById('sidebar');
        const grill = document.getElementById('songGrill');

        function toggleMenu() { sidebar.classList.toggle('active'); }
        function mv(v) { grill.scrollBy({ left: v, behavior: 'smooth' }); }
        
        grill.addEventListener('wheel', (e) => {
            if (e.deltaY !== 0) { e.preventDefault(); grill.scrollLeft += e.deltaY; }
        });
    </script>
</body>
</html>
