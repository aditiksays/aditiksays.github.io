<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digi Journal | Collection</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Work+Sans:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --sidebar-width: 250px;
            --topbar-height: 70px;
            --bg-content: #121212;
            --accent: #d33682;
        }

        body {
            margin: 0;
            font-family: 'Work Sans', sans-serif;
            background-color: #fafafa;
        }

        /* Top Center Search Bar */
        .header-nav {
            position: sticky;
            top: 0;
            height: var(--topbar-height);
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid #eee;
            z-index: 100;
        }

        .header-nav input {
            width: 300px;
            padding: 10px 20px;
            border-radius: 5px;
            border: 1px solid #ddd;
            outline: none;
        }

        /* Slide-In Right Sidebar */
        .sidebar {
            position: fixed;
            right: -250px;
            top: 0;
            width: var(--sidebar-width);
            height: 100%;
            background: #111;
            color: white;
            transition: 0.4s cubic-bezier(0.77, 0, 0.175, 1);
            z-index: 1000;
            padding-top: 80px;
        }

        .sidebar.active { right: 0; }

        .sidebar a {
            display: block;
            padding: 15px 30px;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .menu-btn {
            position: fixed;
            right: 20px;
            top: 20px;
            z-index: 1001;
            background: black;
            color: white;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
        }

        /* Main Container */
        .main-container {
            display: grid;
            grid-template-columns: 40% 60%; /* Adjusted for the portrait grill */
            min-height: 100vh;
        }

        /* LEFT PANEL: PORTRAIT SONG GRILL */
        .left-panel {
            padding: 40px 20px;
            background-color: #f0f0f0;
            border-right: 1px solid #ddd;
            overflow: hidden;
        }

        .grill-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        .song-grill {
            display: flex;
            overflow-x: auto;
            gap: 25px;
            padding: 20px 10px 40px 10px;
            scroll-behavior: smooth;
        }

        .song-grill::-webkit-scrollbar { height: 6px; }
        .song-grill::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }

        /* PORTRAIT SONG CARD */
        .song-card {
            min-width: 180px; /* Portrait width */
            height: 320px;    /* Portrait height */
            background: white;
            box-sizing: border-box;
            border: 6px solid #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: all 0.4s ease;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }

        .song-card img {
            width: 100%;
            height: 80%;
            object-fit: cover;
        }

        .song-card .info {
            padding: 10px;
            text-align: center;
        }

        .song-card a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
            font-size: 0.8rem;
        }

        /* POP-UP EFFECT */
        .song-card:hover {
            transform: scale(1.1) translateY(-20px);
            z-index: 50;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        /* RIGHT PANEL: PHOTO DUMP + CONTENT */
        .right-panel {
            display: flex;
            flex-direction: column;
        }

        .journal-header-area {
            padding: 40px;
            background: white;
        }

        .journal-heading {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            margin: 0;
        }

        .photo-dump-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 0 40px 40px 40px;
        }

        .photo-item {
            background: white;
            padding: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            transition: 0.3s;
        }

        .photo-item img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
        }

        .photo-item:hover { transform: translateY(-5px); }

        /* Writing Box */
        .content-box {
            background-color: var(--bg-content);
            color: #fff;
            padding: 80px 60px;
            font-family: 'Playfair Display', serif;
        }

        .content-box p::first-letter {
            float: left;
            font-size: 6rem;
            line-height: 0.7;
            padding-right: 15px;
            color: var(--accent);
        }

        .content-box p {
            font-size: 1.3rem;
            line-height: 1.8;
        }
    </style>
</head>
<body>

    <button class="menu-btn" onclick="toggleSidebar()">MENU</button>

    <nav class="sidebar" id="sidebar">
        <a href="#">Home</a>
        <a href="#">Galleries</a>
        <a href="#">Playlists</a>
        <a href="#">About</a>
    </nav>

    <header class="header-nav">
        <input type="text" placeholder="Search the journal...">
    </header>

    <div class="main-container">
        
        <section class="left-panel">
            <h2 class="grill-title">The Mixtapes</h2>
            <div class="song-grill" id="songGrill">
                </div>
        </section>

        <section class="right-panel">
            <div class="journal-header-area">
                <h1 class="journal-heading">DIGI JOURNAL</h1>
            </div>
            
            <div class="photo-dump-grid">
                <div class="photo-item"><img src="https://picsum.photos/400/400?random=1"></div>
                <div class="photo-item"><img src="https://picsum.photos/400/400?random=2"></div>
                <div class="photo-item"><img src="https://picsum.photos/400/400?random=3"></div>
                <div class="photo-item"><img src="https://picsum.photos/400/400?random=4"></div>
                <div class="photo-item"><img src="https://picsum.photos/400/400?random=5"></div>
                <div class="photo-item"><img src="https://picsum.photos/400/400?random=6"></div>
            </div>

            <div class="content-box">
                <p>
                    Everything you write here will now use the "Playfair Display" font. 
                    The first letter is significantly larger to act as a classic drop-cap. 
                    This entire right panel is now the home for your visual archives and your long-form thoughts.
                </p>
            </div>
        </section>
    </div>

    <script>
        // Generate 15 Song Placeholders
        const grill = document.getElementById('songGrill');
        for (let i = 1; i <= 15; i++) {
            const card = document.createElement('div');
            card.className = 'song-card';
            card.innerHTML = `
                <img src="https://picsum.photos/300/500?random=${i+20}" alt="Song ${i}">
                <div class="info">
                    <a href="#">TRACK ${i < 10 ? '0' + i : i} 🎵</a>
                </div>
            `;
            grill.appendChild(card);
        }

        // Sidebar Toggle
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        // Horizontal Scroll for the Song Grill
        grill.addEventListener('wheel', (e) => {
            if (e.deltaY !== 0) {
                e.preventDefault();
                grill.scrollLeft += e.deltaY;
            }
        });
    </script>
</body>
</html>
