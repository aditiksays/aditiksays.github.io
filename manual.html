<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digi Journal | Realistic UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Work+Sans:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --sidebar-width: 260px;
            --topbar-height: 70px;
            --bg-writing: #0a0a0a;
            --accent: #ff3e3e;
            --card-radius: 20px;
        }

        body {
            margin: 0;
            font-family: 'Work Sans', sans-serif;
            background-color: #ffffff;
            overflow-x: hidden;
        }

        /* Top Center Search Bar */
        .header-nav {
            position: sticky;
            top: 0;
            height: var(--topbar-height);
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            z-index: 100;
        }

        .header-nav input {
            width: 350px;
            padding: 12px 25px;
            border-radius: 50px;
            border: 1px solid #eee;
            outline: none;
            background: #f5f5f5;
        }

        /* Sidebar & Menu Button */
        .sidebar {
            position: fixed;
            right: -260px;
            top: 0;
            width: var(--sidebar-width);
            height: 100%;
            background: #000;
            transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1);
            z-index: 1000;
            padding-top: 100px;
        }
        .sidebar.active { right: 0; }
        .sidebar a { display: block; padding: 20px 40px; color: #666; text-decoration: none; text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem; }
        .sidebar a:hover { color: #fff; }

        .menu-btn {
            position: fixed;
            right: 30px;
            top: 20px;
            z-index: 1001;
            background: #000;
            color: #fff;
            border: none;
            padding: 10px 18px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.7rem;
        }

        /* Main Layout */
        .main-container {
            display: grid;
            grid-template-columns: 50% 50%;
            min-height: 100vh;
        }

        /* LEFT PANEL: PHOTO DUMP & CONTENT */
        .left-panel {
            border-right: 1px solid #eee;
            display: flex;
            flex-direction: column;
        }

        .journal-header { padding: 60px 50px 20px 50px; }
        .journal-heading { font-family: 'Playfair Display', serif; font-size: 4rem; margin: 0; letter-spacing: -2px; }

        .photo-dump-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 20px 50px 50px 50px;
        }
        .photo-item img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 12px; }

        .content-box {
            background-color: var(--bg-writing);
            color: #fff;
            padding: 80px 50px;
            font-family: 'Playfair Display', serif;
            flex-grow: 1;
        }
        .content-box p::first-letter { float: right; font-size: 6.5rem; line-height: 0.7; padding-right: 15px; color: var(--accent); font-weight: bold; }
        .content-box p { font-size: 1.4rem; line-height: 1.8; opacity: 0.8; }

        /* RIGHT PANEL: REALISTIC SONG GRILL */
        .right-panel {
            position: relative;
            background-color: #fafafa;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
            padding: 40px 0;
        }

        .grill-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
        }

        .song-grill {
            display: flex;
            overflow-x: scroll;
            gap: 40px;
            padding: 60px 100px;
            scrollbar-width: none; /* Hide scrollbar */
            scroll-behavior: smooth;
        }
        .song-grill::-webkit-scrollbar { display: none; }

        /* REALISTIC PORTRAIT CARD */
        .song-card {
            position: relative;
            min-width: 240px;
            height: 400px;
            flex-shrink: 0;
            border-radius: var(--card-radius);
            overflow: visible; /* To allow glow/blur to show */
            transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: pointer;
        }

        /* Blurry Background Effect */
        .card-blur-bg {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: blur(30px) opacity(0.6);
            transform: scale(0.9);
            z-index: -1;
            border-radius: var(--card-radius);
            transition: 0.6s;
        }

        .card-main {
            width: 100%;
            height: 100%;
            background: #fff;
            border-radius: var(--card-radius);
            overflow: hidden;
            position: relative;
            z-index: 2;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .card-main img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.6s;
        }

        .song-info {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            color: white;
            box-sizing: border-box;
        }

        .song-card:hover {
            transform: translateY(-20px) scale(1.05);
        }
        .song-card:hover .card-blur-bg {
            transform: scale(1.1);
            filter: blur(40px) opacity(0.8);
        }

        /* NAVIGATION ARROWS */
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 45px;
            height: 45px;
            background: #000;
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 101;
            border: none;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .nav-arrow:hover { background: var(--accent); transform: translateY(-50%) scale(1.1); }
        .arrow-left { left: 20px; }
        .arrow-right { right: 20px; }

    </style>
</head>
<body>

    <button class="menu-btn" onclick="toggleSidebar()">MENU</button>

    <nav class="sidebar" id="sidebar">
        <a href="#">Journal</a>
        <a href="#">Mixtapes</a>
        <a href="#">Photos</a>
    </nav>

    <header class="header-nav">
        <input type="text" placeholder="Search...">
    </header>

    <div class="main-container">
        <section class="left-panel">
            <div class="journal-header">
                <h1 class="journal-heading">DIGI JOURNAL</h1>
            </div>
            <div class="photo-dump-grid">
                <div class="photo-item"><img src="https://picsum.photos/500/500?random=1"></div>
                <div class="photo-item"><img src="https://picsum.photos/500/500?random=2"></div>
                <div class="photo-item"><img src="https://picsum.photos/500/500?random=3"></div>
                <div class="photo-item"><img src="https://picsum.photos/500/500?random=1"></div>
                <div class="photo-item"><img src="https://picsum.photos/500/500?random=2"></div>
                <div class="photo-item"><img src="https://picsum.photos/500/500?random=3"></div>
                <div class="photo-item"><img src="https://picsum.photos/500/500?random=1"></div>
                <div class="photo-item"><img src="https://picsum.photos/500/500?random=2"></div>
                <div class="photo-item"><img src="https://picsum.photos/500/500?random=3"></div>
            </div>
            <div class="content-box">
                <p>
                    Visual storytelling meets long-form reflection. This design combines the tactile 
                    feel of a physical scrapbook with the sleek, unbounded nature of a modern 
                    digital interface. Use the arrows to explore your curated audio collection.
                </p>
            </div>
        </section>

        <section class="right-panel">
            <div class="grill-wrapper">
                <button class="nav-arrow arrow-left" onclick="scrollGrill(-300)">&#8592;</button>
                
                <div class="song-grill" id="songGrill">
                    </div>

                <button class="nav-arrow arrow-right" onclick="scrollGrill(300)">&#8594;</button>
            </div>
        </section>
    </div>

    <script>
        const grill = document.getElementById('songGrill');
        
        // Generate 15 Realistic Cards
        for (let i = 1; i <= 15; i++) {
            const imgUrl = `https://picsum.photos/400/700?random=${i+100}`;
            const card = document.createElement('div');
            card.className = 'song-card';
            card.innerHTML = `
                <div class="card-blur-bg" style="background-image: url('${imgUrl}')"></div>
                <div class="card-main">
                    <img src="${imgUrl}" alt="Song ${i}">
                    <div class="song-info">
                        <strong>Track ${i < 10 ? '0' + i : i}</strong><br>
                        <small>Artist Name</small>
                    </div>
                </div>
            `;
            grill.appendChild(card);
        }

        // Sidebar Toggle
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        // Arrow Navigation Function
        function scrollGrill(distance) {
            grill.scrollBy({ left: distance, behavior: 'smooth' });
        }

        // Enable horizontal wheel scroll
        grill.addEventListener('wheel', (e) => {
            if (e.deltaY !== 0) {
                e.preventDefault();
                grill.scrollLeft += e.deltaY;
            }
        });
    </script>
</body>
</html>
