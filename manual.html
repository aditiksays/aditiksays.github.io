<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digi Journal | Responsive</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Work+Sans:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-writing: #0d0d0d;
            --accent: #ff3e3e;
            --card-radius: 18px;
            --page-margin: 2vw;
        }

        body {
            margin: 0;
            font-family: 'Work Sans', sans-serif;
            background-color: #ffffff;
            overflow-x: hidden;
        }

        /* Responsive Header */
        .header-nav {
            position: sticky;
            top: 0;
            height: 70px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 0 20px;
        }

        .header-nav input {
            width: 100%;
            max-width: 400px;
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid #eee;
            outline: none;
            background: #f9f9f9;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            right: -260px;
            top: 0;
            width: 260px;
            height: 100%;
            background: #000;
            transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1);
            z-index: 1000;
            padding-top: 80px;
        }
        .sidebar.active { right: 0; }
        .sidebar a { display: block; padding: 20px 40px; color: #555; text-decoration: none; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px;}

        .menu-btn {
            position: fixed;
            right: 20px;
            top: 20px;
            z-index: 1001;
            background: #000;
            color: #fff;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        /* MAIN LAYOUT: 70/30 on Desktop, Stacked on Mobile */
        .main-container {
            display: grid;
            grid-template-columns: 70% 30%;
            gap: 20px;
            padding: var(--page-margin);
            box-sizing: border-box;
        }

        @media (max-width: 900px) {
            .main-container { grid-template-columns: 1fr; }
            .journal-heading { font-size: 3rem !important; }
        }

        /* LEFT PANEL: CONTINUOUS PHOTO DUMP */
        .left-panel { display: flex; flex-direction: column; }
        .journal-heading { font-family: 'Playfair Display', serif; font-size: 5rem; margin-bottom: 20px; letter-spacing: -3px; }

        .photo-dump-grid {
            display: grid;
            /* Auto-fit makes it mobile friendly: it fits as many columns as possible */
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .photo-item img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 10px;
            display: block;
        }

        /* RIGHT PANEL */
        .right-panel { display: flex; flex-direction: column; gap: 20px; }

        .mixtape-section {
            background: #fcfcfc;
            border-radius: 15px;
            padding: 20px;
            position: relative;
        }

        /* Song Grill with Arrows */
        .song-grill-wrapper { position: relative; display: flex; align-items: center; }

        .song-grill {
            display: flex;
            overflow-x: auto;
            gap: 20px;
            padding: 30px 5px;
            scrollbar-width: none;
            scroll-behavior: smooth;
        }
        .song-grill::-webkit-scrollbar { display: none; }

        .song-card {
            position: relative;
            min-width: 150px;
            height: 250px;
            flex-shrink: 0;
            transition: 0.4s;
        }

        /* Realistic Blur Effect */
        .card-blur-bg {
            position: absolute;
            top: 10px; left: 0; width: 100%; height: 100%;
            background-size: cover;
            filter: blur(20px) opacity(0.4);
            z-index: 1;
        }

        .card-main {
            position: relative;
            width: 100%; height: 100%;
            background: #fff;
            border-radius: var(--card-radius);
            overflow: hidden;
            z-index: 2;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .card-main img { width: 100%; height: 100%; object-fit: cover; }

        .song-card:hover { transform: translateY(-10px); }

        .nav-arrow {
            background: rgba(0,0,0,0.7);
            color: white;
            border: none;
            width: 30px; height: 30px;
            border-radius: 50%;
            cursor: pointer;
            position: absolute;
            z-index: 10;
        }
        .a-left { left: -10px; }
        .a-right { right: -10px; }

        /* Writing Box */
        .content-box {
            background-color: var(--bg-writing);
            color: #fff;
            padding: 40px 30px;
            border-radius: 15px;
            font-family: 'Playfair Display', serif;
        }

        .content-box p::first-letter {
            float: left; font-size: 5rem; line-height: 0.7;
            padding-right: 12px; color: var(--accent); font-weight: bold;
        }

        .content-box p { font-size: 1.1rem; line-height: 1.7; opacity: 0.8; }
    </style>
</head>
<body>

    <button class="menu-btn" onclick="toggleS()">MENU</button>
    <nav class="sidebar" id="sidebar">
        <a href="#">Gallery</a>
        <a href="#">Music</a>
        <a href="#">Archive</a>
    </nav>

    <header class="header-nav">
        <input type="text" placeholder="Search...">
    </header>

    <div class="main-container">
        
        <section class="left-panel">
            <h1 class="journal-heading">DIGI JOURNAL</h1>
            <div class="photo-dump-grid" id="photoGrid">
                <div class="photo-item"><img src="https://picsum.photos/600/600?random=1"></div>
                <div class="photo-item"><img src="https://picsum.photos/600/600?random=2"></div>
                <div class="photo-item"><img src="https://picsum.photos/600/600?random=3"></div>
                </div>
        </section>

        <section class="right-panel">
            <div class="mixtape-section">
                <div class="song-grill-wrapper">
                    <button class="nav-arrow a-left" onclick="scrl(-200)">&#10094;</button>
                    <div class="song-grill" id="songGrill">
                        <div class="song-card">
                            <div class="card-blur-bg" style="background-image: url('https://picsum.photos/400/600?random=10')"></div>
                            <div class="card-main"><img src="https://picsum.photos/400/600?random=10"></div>
                        </div>
                    </div>
                    <button class="nav-arrow a-right" onclick="scrl(200)">&#10095;</button>
                </div>
            </div>

            <div class="content-box">
                <p>
                    Your story continues here. As you add more photos to the left, this writing panel will stay aligned with your latest music collection. On mobile, this section will automatically move underneath the photos for better readability.
                </p>
            </div>
        </section>
    </div>

    <script>
        const songGrill = document.getElementById('songGrill');
        const photoGrid = document.getElementById('photoGrid');

        // Initial injection of 15 songs for your start
        for (let i = 1; i <= 15; i++) {
            const img = `https://picsum.photos/400/600?random=${i+20}`;
            const card = document.createElement('div');
            card.className = 'song-card';
            card.innerHTML = `<div class="card-blur-bg" style="background-image: url('${img}')"></div><div class="card-main"><img src="${img}"></div>`;
            songGrill.appendChild(card);
        }

        // Initial injection of more photos for a "continuous" feel
        for (let i = 4; i <= 12; i++) {
            const div = document.createElement('div');
            div.className = 'photo-item';
            div.innerHTML = `<img src="https://picsum.photos/600/600?random=${i}">`;
            photoGrid.appendChild(div);
        }

        function toggleS() { document.getElementById('sidebar').classList.toggle('active'); }
        function scrl(val) { songGrill.scrollBy({ left: val, behavior: 'smooth' }); }
        
        songGrill.addEventListener('wheel', (e) => {
            if (e.deltaY !== 0) { e.preventDefault(); songGrill.scrollLeft += e.deltaY; }
        });
    </script>
</body>
</html>
