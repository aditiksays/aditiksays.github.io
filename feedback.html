<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback | Midnight UI</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent: #38bdf8;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Navigation */
        nav {
            margin-top: 30px;
            background: rgba(15, 23, 42, 0.8);
            padding: 12px 25px;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
        }

        nav a {
            color: var(--text-dim);
            text-decoration: none;
            margin: 0 15px;
            font-weight: 600;
            transition: 0.3s;
        }

        nav a:hover, .active { color: var(--accent); }

        .container {
            width: 90%;
            max-width: 550px;
            margin: 60px 0;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 28px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(16px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 { font-size: 2rem; margin-bottom: 8px; text-align: center; }
        .subtitle { color: var(--text-dim); text-align: center; margin-bottom: 30px; font-size: 0.9rem; }

        /* Form Elements */
        .input-group { margin-bottom: 25px; }

        label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            color: var(--accent);
        }

        input, textarea, select {
            width: 100%;
            padding: 14px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(15, 23, 42, 0.9);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.1);
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            color: #0f172a;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.3);
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="blog.html">Blog</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="feedback.html" class="active">Feedback</a>
    </nav>

    <div class="container">
        <h1>Send Feedback</h1>
        <p class="subtitle">Help me improve this digital space.</p>

        <form action="https://formspree.io/f/your-id" method="POST">
            <div class="input-group">
                <label>Experience Rating</label>
                <select name="rating">
                    <option value="excellent">Amazing ✨</option>
                    <option value="good">Good 👍</option>
                    <option value="neutral">Okay 😐</option>
                    <option value="bad">Needs Work 🛠️</option>
                </select>
            </div>

            <div class="input-group">
                <label>Your Thoughts</label>
                <textarea name="message" required placeholder="What should I build next?"></textarea>
            </div>

            <button type="submit" class="submit-btn">Transmit Feedback</button>
        </form>
    </div>

</body>
</html>
