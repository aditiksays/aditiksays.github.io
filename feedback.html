<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Sheet | Teacher's Edition</title>
    <style>
        :root {
            --bg-color: #fffdf5;
            --paper-bg: #ffffff;
            --accent: #ffb7c5;
            --teacher-red: #ff4d6d; /* Red pen color */
            --ink-blue: #2b4570;    /* Classic school ink */
            --line-color: #e0f0ff;  /* Blue notebook lines */
            --text-main: #5d4d50;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(#f0eadd 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            color: var(--text-main);
            font-family: 'Segoe UI', cursive, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        nav {
            margin-top: 30px;
            background: white;
            padding: 12px 25px;
            border-radius: 25px;
            border: 3px solid var(--accent);
            box-shadow: 5px 5px 0px var(--accent);
        }

        nav a {
            color: var(--text-main);
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
            text-transform: lowercase;
        }

        .active { color: var(--teacher-red) !important; }

        .container {
            width: 90%;
            max-width: 500px;
            margin: 60px 0;
            background: var(--paper-bg);
            /* Creating the notebook line effect */
            background-image: linear-gradient(var(--line-color) 1px, transparent 1px);
            background-size: 100% 30px;
            padding: 50px 40px;
            border-radius: 5px; /* Sharper corners for a sheet of paper */
            border-left: 40px solid #fff; /* Margin area */
            box-shadow: 2px 2px 10px rgba(0,0,0,0.1), 15px 15px 0px #fff;
            position: relative;
        }

        /* Red vertical margin line */
        .container::after {
            content: '';
            position: absolute;
            top: 0;
            left: -10px;
            height: 100%;
            width: 2px;
            background: rgba(255, 77, 109, 0.3);
        }

        /* Red Pen "Grade" Sticker */
        .grade {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            border: 3px double var(--teacher-red);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--teacher-red);
            font-weight: 900;
            font-size: 1.5rem;
            transform: rotate(15deg);
        }

        h1 { 
            color: var(--ink-blue); 
            font-family: 'Brush Script MT', cursive; /* Makes it look handwritten */
            font-size: 2.5rem;
            margin: 0;
        }

        .subtitle { 
            color: var(--text-main); 
            margin-bottom: 40px; 
            font-size: 0.9rem;
            border-bottom: 2px solid var(--teacher-red);
            display: inline-block;
        }

        .input-group { margin-bottom: 30px; position: relative; }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: bold;
            color: var(--teacher-red);
            margin-bottom: 5px;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px 0;
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--ink-blue); /* Underline style like a form */
            color: var(--ink-blue);
            font-family: inherit;
            font-size: 1.1rem;
            box-sizing: border-box;
        }

        textarea {
            line-height: 30px; /* Matches the paper lines */
            height: 120px;
            resize: none;
        }

        input:focus, textarea:focus { outline: none; background: rgba(224, 240, 255, 0.2); }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--teacher-red);
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 4px 4px 0px #b91c1c;
            transition: 0.2s;
        }

        .submit-btn:hover { transform: translateY(2px); box-shadow: 2px 2px 0px #b91c1c; }

        .sticker {
            position: absolute;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">home</a>
        <a href="blog.html">blog</a>
        <a href="about.html">about</a>
        <a href="contact.html">contact</a>
        <a href="feedback.html" class="active">feedback</a>
    </nav>

    <div class="container">
        <div class="grade">A+</div>
        
        <img src="heart-sticker.png" class="sticker" style="width: 50px; bottom: -20px; left: -30px; transform: rotate(-10deg);" alt="">
        
        <h1>Remark Sheet</h1>
        <p class="subtitle">Assignment: Digital Space Improvement</p>

        <form action="https://formspree.io/f/your-id" method="POST">
            <div class="input-group">
                <label>Student Rating (Select One):</label>
                <select name="rating">
                    <option value="excellent">Excellent Work! 🌟</option>
                    <option value="good">Very Good 👍</option>
                    <option value="neutral">Satisfactory 😐</option>
                    <option value="bad">Needs Improvement 🛠️</option>
                </select>
            </div>

            <div class="input-group">
                <label>Teacher's Comments:</label>
                <textarea name="message" required placeholder="Write your remarks here..."></textarea>
            </div>

            <button type="submit" class="submit-btn">HAND IN ASSIGNMENT</button>
        </form>
    </div>

</body>
</html>
