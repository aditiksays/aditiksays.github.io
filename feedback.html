<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback | Midnight UI</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        nav {
            margin-top: 30px;
            background: rgba(30, 41, 59, 0.5);
            padding: 15px 30px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        nav a {
            color: var(--text-dim);
            text-decoration: none;
            margin: 0 15px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        nav a:hover { color: var(--accent); }
        .active { color: var(--accent); text-shadow: 0 0 8px var(--accent); }

        .container {
            width: 90%;
            max-width: 600px;
            margin-top: 60px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        h1 { margin-bottom: 10px; color: var(--accent); }
        p { color: var(--text-dim); margin-bottom: 30px; }

        /* Form Styling */
        .form-group { margin-bottom: 20px; }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: white;
            font-family: inherit;
            box-sizing: border-box; /* Prevents overflow */
        }

        textarea { height: 120px; resize: vertical;}

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: var(--bg-color);
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="blog.html">Blog</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="feedback.html" class="active">Feedback</a>
    </nav>

    <div class="container">
        <h1>Feedback</h1>
        <p>How am I doing? Leave your thoughts or suggestions below.</p>

        <form action="https://formspree.io/f/your-id-here" method="POST">
            <div class="form-group">
                <label>Your Name</label>
                <input type="text" name="name" placeholder="Optional">
            </div>

            <div class="form-group">
                <label>Message</label>
                <textarea name="message" required placeholder="What's on your mind?"></textarea>
            </div>

            <button type="submit" class="submit-btn">Send Feedback</button>
        </form>
    </div>

</body>
</html>
